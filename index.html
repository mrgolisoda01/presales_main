<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFC Sales Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2027;--app-bg:#E9F0EE;--card:#FFFFFF;--line:#D5E0DC;
    --teal:#0F6E6A;--teal-2:#4FB6AC;--teal-ink:#0A4E4B;
    --green:#2E7D5B;--amber:#C77D00;--red:#B23A2E;--muted:#5B7169;
    --green-bg:#E5F1EA;--amber-bg:#FBF0DC;--red-bg:#F7E2DF;--teal-bg:#E2F0EE;
    --disp:'Space Grotesk',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --body:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sh:0 1px 2px rgba(11,32,39,.05),0 8px 24px rgba(11,32,39,.06);
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--app-bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  h1,h2,h3{font-family:var(--disp);font-weight:600;margin:0}
  button{font-family:inherit;cursor:pointer}a{color:var(--teal-ink)}

  /* ---- app shell ---- */
  .app{display:flex;min-height:100vh}
  .side{width:214px;flex:none;background:var(--ink);color:#EAF3F1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:18px 16px;display:flex;gap:11px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08)}
  .marble{width:26px;height:26px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 32% 28%,#Eafcfa 0 8%,var(--teal-2) 34%,var(--teal) 78%,#063f3c 100%);
    box-shadow:inset -2px -2px 4px rgba(0,0,0,.35),inset 2px 2px 5px rgba(255,255,255,.5),0 1px 3px rgba(0,0,0,.4)}
  .brand b{font-family:var(--disp);font-weight:700;font-size:15.5px;letter-spacing:.2px;display:block;line-height:1.1}
  .brand span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8FBAB4}
  .snav-wrap{display:flex;flex-direction:column;padding:10px 10px;gap:2px}
  .snav{display:flex;align-items:center;gap:10px;background:none;border:none;color:#9fc3bd;font-size:13.5px;font-weight:600;text-align:left;padding:10px 12px;border-radius:9px;width:100%}
  .snav .ic{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.5;flex:none}
  .snav.active{background:var(--teal);color:#fff}.snav.active .ic{opacity:1;background:#fff}
  .snav:hover:not(.active):not(:disabled){background:rgba(255,255,255,.07);color:#fff}
  .snav:disabled{opacity:.4;cursor:default}
  .snav .soon{font-size:9px;font-weight:600;color:#7fa39d;border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:1px 4px;margin-left:auto}
  .sfoot{margin-top:auto;padding:14px 16px;font-size:11px;color:#7fa39d;border-top:1px solid rgba(255,255,255,.08)}
  .content{flex:1;min-width:0;display:flex;flex-direction:column}
  main{max-width:1120px;width:100%;margin:0 auto;padding:22px 26px 60px}
  .panel{display:none}.panel.active{display:block}

  /* ---- sync strip ---- */
  .syncstrip{border-bottom:1px solid var(--line)}
  .syncstrip .ss-wrap{max-width:1120px;margin:0 auto;padding:10px 26px;display:flex;align-items:center;gap:11px;font-size:13px}
  .syncstrip.ok{background:var(--green-bg)}.syncstrip.ok .ss-txt{color:var(--green)}
  .syncstrip.need{background:var(--amber-bg)}.syncstrip.need .ss-txt{color:#7a5200}
  .ss-dot{width:9px;height:9px;border-radius:50%;flex:none}
  .syncstrip.ok .ss-dot{background:var(--green)}
  .syncstrip.need .ss-dot{background:var(--amber);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .ss-txt{font-weight:600}
  .ss-btn{margin-left:auto;background:var(--teal);color:#fff;border:none;padding:6px 14px;border-radius:7px;font-weight:600;font-size:12.5px;white-space:nowrap}
  .ss-btn:hover{background:#12807b}
  .ss-ok{margin-left:auto;color:var(--green);font-weight:700}

  .toolrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .toolrow label{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700}
  select,input[type=number],input[type=text],input[type=date]{font-family:var(--body);font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink)}
  .selmono{font-family:var(--mono)}.spacer{margin-left:auto}

  .cards5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 15px 13px;box-shadow:var(--sh);cursor:pointer;transition:.15s;position:relative}
  .mcard:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(11,32,39,.12)}
  .mcard.active{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-bg),var(--sh)}
  .mcard .step{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--teal);text-transform:uppercase}
  .mcard .lab{font-family:var(--disp);font-weight:600;font-size:15px;margin:3px 0 8px}
  .mcard .big{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:-.5px;line-height:1}
  .mcard .big .of{font-size:15px;color:var(--muted);font-weight:600}
  .mcard .sub{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.35}
  .mcard .clockrow{display:flex;gap:5px;margin-top:9px}
  .chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
  .chip.g{background:var(--green-bg);color:var(--green)}.chip.a{background:var(--amber-bg);color:var(--amber)}.chip.r{background:var(--red-bg);color:var(--red)}
  .mcard .fmnote{font-size:11px;color:var(--muted);margin-top:8px;border-top:1px dashed var(--line);padding-top:7px}
  .mcard .basefrom{font-size:11px;color:var(--teal-ink);margin-top:6px;background:var(--teal-bg);border-radius:6px;padding:4px 8px}
  .mcard.good .big{color:var(--green)}.mcard.warn .big{color:var(--amber)}.mcard.bad .big{color:var(--red)}

  .detail{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);margin-bottom:22px;overflow:hidden}
  .detail .dh{padding:13px 16px;border-bottom:1px solid var(--line);background:#F3F8F6;display:flex;align-items:baseline;gap:10px}
  .detail .dh h3{font-size:14px}.detail .dh .m{font-size:12px;color:var(--muted)}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:right;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th:first-child{text-align:left}
  tbody td{padding:10px 12px;text-align:right;border-bottom:1px solid #EDF3F1;font-size:13.5px}
  tbody td:first-child{text-align:left;font-weight:600}
  tbody tr:last-child td{border-bottom:none}
  tr.totrow td{background:#F3F8F6;font-weight:700;border-top:1px solid var(--line)}
  .terr{font-weight:400;color:var(--muted);font-size:11px}
  .pill{display:inline-block;min-width:40px;padding:3px 8px;border-radius:20px;font-family:var(--mono);font-weight:600;font-size:12.5px;text-align:center}
  .pill.g{background:var(--green-bg);color:var(--green)}.pill.a{background:var(--amber-bg);color:var(--amber)}.pill.r{background:var(--red-bg);color:var(--red)}
  .yes{color:var(--green);font-weight:700}.no{color:var(--red);font-weight:700}.warnt{color:var(--amber);font-weight:700}

  .tree{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);overflow:hidden}
  .trow{display:grid;grid-template-columns:1.7fr .8fr .9fr .9fr .9fr .9fr;align-items:center;padding:11px 16px;border-bottom:1px solid #EDF3F1;font-size:13px}
  .trow.head{background:#F3F8F6;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
  .trow .rt{text-align:right}
  .trow.lv0{font-weight:700}.trow.lv1{padding-left:34px;background:#FbFdFC}.trow.lv2{padding-left:56px}
  .caret{display:inline-block;width:14px;color:var(--teal);font-family:var(--mono);cursor:pointer;user-select:none}
  .tname{display:flex;align-items:center;gap:6px}.fmtag{font-size:11px;color:var(--muted);font-weight:400}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--sh)}
  .kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
  .kpi .val{font-family:var(--disp);font-weight:700;font-size:29px;margin-top:4px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi.good .val{color:var(--green)}.kpi.warn .val{color:var(--amber)}.kpi.bad .val{color:var(--red)}
  .mk{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:-1px;margin-right:7px;box-shadow:inset -1px -1px 2px rgba(0,0,0,.3),inset 1px 1px 2px rgba(255,255,255,.6)}
  .mk.g{background:radial-gradient(circle at 33% 30%,#cfeede 0 10%,var(--green) 80%)}.mk.a{background:radial-gradient(circle at 33% 30%,#f6e2bd 0 10%,var(--amber) 80%)}.mk.r{background:radial-gradient(circle at 33% 30%,#f2c9c3 0 10%,var(--red) 80%)}

  .sec{margin-bottom:26px}.sechead{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}.sechead h2{font-size:16px}.sechead .meta{font-size:12px;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

  .setgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px}
  .setcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:var(--sh)}
  .setcard h3{font-size:14px;margin-bottom:14px}
  .fld{margin-bottom:15px}.fld label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
  .fld .desc{font-size:11.5px;color:var(--muted);margin-top:4px}.fld input{width:120px}
  .btn{background:var(--teal);color:#fff;border:none;padding:9px 15px;border-radius:8px;font-weight:600;font-size:13px}
  .btn:hover{background:#12807b}
  .btn.ghost{background:#fff;color:var(--red);border:1px solid var(--line)}.btn.ghost:hover{border-color:var(--red)}
  .mini{background:#fff;border:1px solid var(--line);border-radius:6px;padding:4px 9px;font-size:12px;font-weight:600;color:var(--teal-ink);margin-left:5px}
  .mini:hover{border-color:var(--teal)}.mini.del{color:var(--red)}.mini.del:hover{border-color:var(--red)}
  .setuptbl input,.setuptbl select{padding:5px 7px;font-size:12.5px}

  .empty{background:var(--card);border:1.5px dashed var(--line);border-radius:14px;padding:54px 24px;text-align:center;box-shadow:var(--sh)}
  .empty .em{width:50px;height:50px;border-radius:50%;margin:0 auto 16px;background:radial-gradient(circle at 32% 28%,#Eafcfa 0 8%,var(--teal-2) 34%,var(--teal) 78%,#063f3c 100%);box-shadow:inset -3px -3px 6px rgba(0,0,0,.3),inset 3px 3px 7px rgba(255,255,255,.5)}
  .empty h2{font-size:19px;margin-bottom:8px}.empty p{color:var(--muted);max-width:460px;margin:0 auto 8px}
  .empty .btn{margin-top:10px}

  tr.clk{cursor:pointer}tr.clk:hover td{background:#F3F8F6}
  td.clkcell{cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:2px}
  td.clkcell:hover{background:#F3F8F6;color:var(--teal-ink)}
  .kpiclick{cursor:pointer;transition:box-shadow .12s,transform .12s}
  .kpiclick:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);transform:translateY(-1px)}
  .apred{color:#C0392B!important;font-weight:700}
  .andot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:middle}
  .andot.c{background:#C0392B}.andot.w{background:#E08a00}.andot.m{background:#9aa}
  .anrow td,.anfmrow td{cursor:pointer}
  .modal{position:fixed;inset:0;background:rgba(11,32,39,.5);display:none;align-items:flex-start;justify-content:center;z-index:70;padding:40px 16px;overflow:auto}
  .modal.show{display:flex}
  .modal-card{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.35);max-width:860px;width:100%;overflow:hidden}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);background:#F3F8F6}
  .modal-h h3{font-size:15px}
  .modal-body{max-height:70vh;overflow:auto}
  .modal-body td{font-size:13px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:.28s;z-index:60;max-width:80vw}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .foot{max-width:1120px;margin:0 auto;padding:0 26px 30px;color:var(--muted);font-size:11.5px}
  .banner{background:var(--amber-bg);border:1px solid #E7C889;color:#7a5200;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:18px}

  @media(max-width:860px){
    .app{flex-direction:column}
    .side{width:100%;height:auto;position:static;flex-direction:row;align-items:center;overflow-x:auto}
    .brand{border-bottom:none;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap}
    .snav-wrap{flex-direction:row;padding:8px}.snav{width:auto;white-space:nowrap}.snav .soon{display:none}.sfoot{display:none}
    .cards5{grid-template-columns:1fr 1fr}.kpis,.setgrid,.grid2{grid-template-columns:1fr}
    .trow{grid-template-columns:1.4fr .8fr .8fr .8fr}.trow .h5,.trow .c5{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="marble"></div><div><b>SAFC Tracker</b><span>Mr. Goli Soda</span></div></div>
    <div class="snav-wrap">
      <button class="snav active" data-panel="dash"><span class="ic"></span>Dashboard</button>
      <button class="snav" data-panel="targets"><span class="ic"></span>Target vs Achievement</button>
      <button class="snav" data-panel="action"><span class="ic"></span>Action Performed</button>
      <button class="snav" data-panel="talktime"><span class="ic"></span>Talk-Time</button>
      <button class="snav" data-panel="speed"><span class="ic"></span>Speed to Lead</button>
      <button class="snav" data-panel="statuschange"><span class="ic"></span>Status Change</button>
      <button class="snav" data-panel="workhours"><span class="ic"></span>Working Hours</button>
      <button class="snav" data-panel="greenflags"><span class="ic"></span>Green Flags</button>
      <button class="snav" data-panel="anomaly"><span class="ic"></span>Red Flags</button>
      <button class="snav" data-panel="buckets"><span class="ic"></span>Buckets</button>
      <button class="snav" data-panel="mis"><span class="ic"></span>Sale / MIS entry</button>
      <button class="snav" data-panel="overrides"><span class="ic"></span>Milestone edits</button>
      <button class="snav" data-panel="data"><span class="ic"></span>Data input</button>
      <button class="snav" data-panel="setup"><span class="ic"></span>Setup</button>
      <button class="snav" data-panel="settings"><span class="ic"></span>Settings</button>
      <button class="snav" disabled><span class="ic"></span>Activity<span class="soon">soon</span></button>
      <button class="snav" disabled><span class="ic"></span>Priority<span class="soon">soon</span></button>
    </div>
    <div class="sfoot" id="sfoot"></div>
  </aside>
  <div class="content">
    <div id="syncStrip"></div>
    <main>
      <section class="panel active" id="dash"></section>
      <section class="panel" id="targets"></section>
      <section class="panel" id="speed"></section>
      <section class="panel" id="buckets"></section>
      <section class="panel" id="data"></section>
      <section class="panel" id="mis"></section>
      <section class="panel" id="statuschange"></section>
      <section class="panel" id="action"></section>
      <section class="panel" id="talktime"></section>
      <section class="panel" id="workhours"></section>
      <section class="panel" id="greenflags"></section>
      <section class="panel" id="overrides"></section>
      <section class="panel" id="anomaly"></section>
      <section class="panel" id="setup"></section>
      <section class="panel" id="settings"></section>
    </main>
    <div class="foot" id="foot"></div>
  </div>
</div>
<input type="file" id="dataFile" accept=".csv" hidden multiple>
<input type="file" id="scFile" accept=".csv" hidden>
<div class="modal" id="leadModal"><div class="modal-card"><div class="modal-h"><h3 id="mlTitle"></h3><button class="mini" id="mlClose">Close</button></div><div class="modal-body" id="mlBody"></div></div></div>
<div class="toast" id="toast"></div>

<script>
/* SAFC Sales Tracker.
   Data is event-sourced: every upload is a dated BATCH of rows kept as-is.
   The running lead store (CACHE.leads) is DERIVED by replaying all batches in
   date order — so editing a date, replacing a file, or deleting one always
   rebuilds a correct picture. */

const CACHE={batches:[],leads:{},meta:{},cfg:{},master:{},manual:{},overrides:{},changes:[]};
let IDB_OK=true;
function idbOpen(){return new Promise((res,rej)=>{try{const r=indexedDB.open('safc_tracker',2);
  r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains('kv'))r.result.createObjectStore('kv');};
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}catch(e){rej(e);}});}
async function idbGet(k){try{const db=await idbOpen();return await new Promise((res,rej)=>{const t=db.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error);});}catch(e){IDB_OK=false;return undefined;}}
async function idbSet(k,v){try{const db=await idbOpen();return await new Promise((res,rej)=>{const t=db.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=()=>res(true);t.onerror=()=>rej(t.error);});}catch(e){IDB_OK=false;return false;}}
function persist(){idbSet('batches',CACHE.batches);idbSet('meta',CACHE.meta);idbSet('cfg',CACHE.cfg);idbSet('master',CACHE.master);idbSet('manual',CACHE.manual);idbSet('overrides',CACHE.overrides);}

const DEFAULT_CFG={workStart:9,cutoff:19,target5:5,grace15:15,mvRatio:20,saleRatio:100,agreeDays:10,payDays:60,loiAmt:50000,agreeAmt:900000,rounding:'round',ttFresh:20,ttElig:5,ttR2M:3,ttMV:3,ttConn:50,ttConnTry:10,ttDay:480,ttLowBase:60,ttJunk:60,ttAttSec:45,ttActiveMin:30,ttDeepMin:20,ttDeepN:5,ggDayPts:10};
function cfg(){return Object.assign({},DEFAULT_CFG,CACHE.cfg);}

function parseCSV(t){if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){if(c==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c==='\r'){}else cur+=c;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}return rows;}
function pdate(s){if(!s)return null;s=(''+s).trim();if(s===''||s==='-'||s==='_')return null;
  const m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{1,2}):(\d{2}):(\d{2})$/);if(!m)return null;
  return new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5],+m[6]).getTime();}
function pdateAny(s){if(!s)return null;s=(''+s).trim();if(s===''||s==='-'||s==='_')return null;
  let d=pdate(s);if(d!=null)return d;const m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(m)return new Date(+m[3],+m[2]-1,+m[1]).getTime();return null;}
function ymd(d){d=new Date(d);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayToMs(s){const p=(''+s).split('-').map(Number);return new Date(p[0],p[1]-1,p[2]).getTime();}
function addDays(ms,n){return ms+n*86400000;}
function todayStart(){const d=new Date();d.setHours(0,0,0,0);return d.getTime();}

    iBy=ix('Action Created By name'),iAss=ix('Assignee name'),iName=ix('Name'),iPh=ix('Phone'),iLid=ix('Lead id'),
    iDist=ix('Districts','State and Districts Districts');
  if(iFrom<0||iTo<0||iPh<0)throw new Error('Not a status-change log (need From status / To status / Phone).');
  const out=[];for(let r=1;r<rows.length;r++){const row=rows[r];if(!row||row.length<head.length)continue;
    const ph=key(row[iPh]);if(!ph||ph==='_'||ph==='-')continue;

/* ---- date a milestone was reached ----
   Priority: real Status-Last-Updated timestamp > observed transition day > lead's created date.
   NEVER the upload day, or standing leads would falsely count as this-week wins. */
function mileDate(mr,prev,stage,dms){
  if(mr.su)return mr.su;                      // real status-change timestamp (most reliable)
  if(prev!==null&&prev!==stage)return dms;    // we watched the move happen on this upload day
  return mr.cr||dms;                          // pre-existing / first time we see it: use created date
}
/* ---- apply one row into the derived lead store ---- */
function applyRow(mr,type,dms){const k=mr.lid||mr.ph;let lead=CACHE.leads[k];

  if(mr.ph&&!lead.phone)lead.phone=mr.ph;
  const prev=lead.status;
  lead.lastSeen=dms;
  if(mr.nm)lead.name=mr.nm;if(mr.dist)lead.dist=mr.dist;if(mr.src)lead.src=mr.src;if(mr.rc)lead.recap=true;
  if(mr.cr&&!lead.createdOn)lead.createdOn=mr.cr;
  if(mr.fc&&(!lead.firstCall||mr.fc<lead.firstCall))lead.firstCall=mr.fc;
  if(mr.cc!=null)lead.calls=Math.max(lead.calls||0,mr.cc);
  if(mr.dur!=null)lead.dur=Math.max(lead.dur||0,mr.dur);
  if(mr.cn!=null)lead.conn=Math.max(lead.conn||0,mr.cn);
  if(mr.nf!=null)lead.nf=mr.nf;

function ttRequirement(fm){const C=cfg();const out={};let total=0;
  let nF=0,nT=0;
  for(const [g] of TT_GROUPS){let n=0;for(const k in CACHE.leads){const l=CACHE.leads[k];if(/^telecaller/i.test(l.ass||''))continue;if(fm&&(l.ass||'—')!==fm)continue;const st=l.status||'';
    if(g==='fresh'){if(ttGroupOf(st)==='fresh'){n++;if(/^fresh/i.test(st))nF++;else nT++;}}
    else if(ttGroupOf(st)===g)n++;}
    if(g==='fresh'){const reqF=Math.round(nF*(C.ttConn/100)*C.ttFresh),reqT=Math.round(nT*(C.ttConnTry/100)*C.ttFresh);
      out.freshOnly={n:nF,req:reqF};out.tryOnly={n:nT,req:reqT};out[g]={n:n,req:reqF+reqT};total+=reqF+reqT;}
    else{const req=Math.round(n*ttStd(C,g));out[g]={n:n,req:req};total+=req;}}
  out._total=total;return out;}
function ttTagHTML(tags){return tags.length?tags.map(x=>`<span class="pill ${x.cls}" title="${x.tip}">${x.txt}</span>`).join(' '):'\u2014';}
function ttPct(v,goodHi){if(v==null)return '<td class="num" style="color:var(--line)">\u2014</td>';const p=Math.round(v*100);
  const cls=goodHi?(p>=50?'yes':p<25?'no':''):(p>=30?'no':p<10?'yes':'');return `<td class="num ${cls}">${p}%</td>`;}
function ttAvgCell(avgSec,stdMin){if(avgSec==null)return '<td class="num" style="color:var(--line)">\u2014</td>';const m=avgSec/60;
  const cls=m>=stdMin?'yes':m<stdMin/2?'no':'';return `<td class="num ${cls}">${fmtDur(avgSec)}</td>`;}
function renderTalkTime(){const panel=$('#talktime');if(!panel)return;
  if(!hasData()){panel.innerHTML=emptyState('Upload lead data first','Talk-Time shows how many minutes each FM\u2019s bucket demands, ideal vs spoken, junk calls, connect rate, active hours and rankings.');wireEmpty();return;}
  const C=cfg();const p=ttPeriod();const start=p.start,end=p.end;const fm=SEL.ttfm||'';
  const fms=apFMs();
  const hasCalls=CACHE.batches.some(b=>b.type==='calllog'&&dayToMs(b.date)>=start&&dayToMs(b.date)<end);
  const warn=hasCalls?'':'<div class="banner" style="background:#FEF3E2;border-color:#F0C36D;color:#7A4F10">\u26a0 No call-details file uploaded for this period \u2014 spoken minutes, junk % and connect rate will read low. Upload CALLDETAILS in Data input.</div>';
  /* ---- rankings ---- */
  const rows=fms.map(f=>{const T=ttStats(f,start,end);const F=ttFulfilS(T);return {fm:f,T,F};})
    .filter(r=>r.F.ideal>0||r.T.attAll>0);
  rows.sort((a,b)=>(b.F.pct||0)-(a.F.pct||0));
  const rankRows=rows.map((r,i)=>{const T=r.T,S=T.S;const low=r.F.ideal<C.ttLowBase;
    return `<tr class="clk" data-ttfm="${encodeURIComponent(r.fm)}" style="${i===0?'background:#FFFBEA':''}${i===rows.length-1&&rows.length>1?'background:#FEF2F2':''}">
      <td class="num"><b>${i+1}</b></td><td style="white-space:nowrap">${r.fm}${low?' <span class="pill a">low base</span>':''}</td>
      <td class="num">${r.F.ideal}</td><td class="num">${r.F.spoken}</td><td class="num ${r.F.pct!=null&&r.F.pct>=90?'yes':r.F.pct!=null&&r.F.pct<60?'no':''}">${r.F.pct!=null?r.F.pct+'%':'\u2014'}</td>
      ${ttAvgCell(S.fresh.median,C.ttFresh)}${ttAvgCell(S.elig.median,C.ttElig)}${SEL.ttMore?ttAvgCell(S.r2m.median,C.ttR2M)+ttAvgCell(S.mv.median,C.ttMV):''}
      <td class="num clkcell ${T.connRate!=null?(T.connRate>=0.5?'yes':T.connRate<0.25?'no':''):''}" data-cr="${encodeURIComponent(r.fm)}">${T.connRate!=null?Math.round(T.connRate*100)+'% <span style="color:var(--muted)">('+T.connAll+'/'+T.attAll+')</span>':'\u2014'}</td>
      </tr>`;}).join('');
  const rankTbl=rows.length?`<div class="card ttcompact" style="overflow:auto"><table><thead><tr><th>#</th><th>FM</th><th>Owed min</th><th>Spoken min</th><th>Done %</th><th>Med F</th><th>Med E</th>${SEL.ttMore?'<th>Med R2M</th><th>Med MV</th>':''}<th>Connect</th></tr></thead><tbody>${rankRows}</tbody></table>
    </div>
    <details class="card" style="margin-top:10px;padding:10px 16px;font-size:12px;color:var(--muted);line-height:1.9">
      <summary style="cursor:pointer;color:var(--ink);font-weight:600">What do these columns mean? (click to show / hide)</summary>
      <div style="margin-top:6px">
      <b>Owed min</b> \u2014 the minutes this FM owed: every lead he <i>connected with</i> \u00d7 the standard for its stage (fresh ${C.ttFresh}m, eligible ${C.ttElig}m, R2M ${C.ttR2M}m, MV ${C.ttMV}m). In week/month view it adds up across the whole period.<br>
      <b>Spoken min</b> \u2014 minutes he actually spoke (connected calls only).<br>
      <b>Done %</b> \u2014 spoken \u00f7 owed. 100% = every connected lead got its full time. \u2265 90% green, &lt; 60% red.<br>
      <b>Med F / E / R2M / MV</b> \u2014 the <i>median</i> connected call in that stage: line his calls up shortest to longest and take the middle one. If Med F reads 53s, half his fresh calls were 53 seconds or shorter \u2014 the typical call, which one long call can\u2019t fake. Red = below half the standard.<br>
      <b>Connect</b> \u2014 connected \u00f7 attempted, with raw counts. Click for the leads not picking up.<br>
      Working hours &amp; active hours have moved to their own report \u2014 the <b>Working Hours</b> tab.
      </div></details>`
    :'<div class="banner">No call activity in this period.</div>';
  /* ---- requirement (morning) ---- */
  const req=ttRequirement(fm);
  const avail=C.ttDay*(fm?1:Math.max(1,fms.length));
  const fits=req._total<=avail;
  const reqRows=[`<tr><td>Fresh</td><td class="num">${req.freshOnly.n}</td><td style="color:var(--muted)">\u00d7${C.ttConn}% \u00d7${C.ttFresh}m</td><td class="num">${req.freshOnly.req}</td></tr>`,
    `<tr><td>Try 1/2/3</td><td class="num">${req.tryOnly.n}</td><td style="color:var(--muted)">\u00d7${C.ttConnTry}% \u00d7${C.ttFresh}m</td><td class="num">${req.tryOnly.req}</td></tr>`]
    .concat(TT_GROUPS.filter(([g])=>g!=='fresh').map(([g,lb])=>{const o=req[g];
    return `<tr><td>${lb}</td><td class="num">${o.n}</td><td style="color:var(--muted)">\u00d7${ttStd(C,g)}m</td><td class="num">${o.req}</td></tr>`;})).join('');
  const reqTbl=`<div class="card"><table><thead><tr><th>Stage</th><th>In bucket now</th><th>Rule</th><th>Required min</th></tr></thead><tbody>${reqRows}
    <tr style="background:#F3F8F6"><td><b>Total</b></td><td></td><td></td><td class="num"><b>${req._total}</b></td></tr></tbody></table>
    <div style="padding:10px 16px;font-size:13px;border-top:1px solid var(--line)" class="${fits?'yes':'no'}">${fits?'\u2713 fits the day':'\u2717 over capacity'} \u2014 requires <b>${req._total}</b> of <b>${avail}</b> available minutes${fm?'':' (all FMs \u00d7 '+C.ttDay+'m)'}. ${fits?'':'Plan which leads get the time.'}</div></div>`;
  /* ---- reckoning (evening): connected leads \u00d7 standard for EVERY stage ---- */
  const T0=ttStats(fm,start,end);
  const reckRows=TT_GROUPS.map(([g,lb])=>{const R=T0.S[g];const gap=Math.min(R.spoken,R.ideal)-R.ideal;
    const std=ttStd(cfg(),g);const perLead=R.medLead!=null?R.medLead/60:null;
    const plCell=perLead==null?'<td class="num" style="color:var(--line)">\u2014</td>':`<td class="num ${perLead>=std?'yes':perLead<std/2?'no':''}"><b>${Math.round(perLead*10)/10}</b> / ${std}m</td>`;
    return `<tr><td>${lb}</td><td class="num">${R.connLeadCount}</td><td class="num">${R.ideal}</td><td class="num clkcell" data-ttg="${g}">${R.spoken}</td>${plCell}<td class="num ${gap<0?'no':'yes'}">${gap<0?gap:'met \u2713'}</td></tr>`;}).join('');
  const reckTbl=`<div class="card"><table><thead><tr><th>Stage</th><th>Connected leads</th><th>Owed min</th><th>Spoken min</th><th>Per lead</th><th>Gap</th></tr></thead><tbody>${reckRows}</tbody></table>
    <div style="padding:8px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)">Owed = connected leads \u00d7 standard \u2014 you can\u2019t speak to a lead who didn\u2019t pick up. Per lead = the <i>middle</i> connected lead\u2019s minutes vs the standard (median \u2014 e.g. <b>2</b> / 20m means half his leads got 2 minutes or less). Click Spoken for the lead-by-lead breakup.</div></div>`;
  /* ---- FM detail: hour map + day trend ---- */
  let detail='';
  if(fm&&p.mode!=='day'){const tr=[];for(let d0=start;d0<end;d0=addDays(d0,1)){if(new Date(d0).getDay()===0)continue;
      const Td=ttStats(fm,d0,addDays(d0,1));const Fd=ttFulfilS(Td);if(Fd.ideal===0&&Td.attAll===0)continue;
      tr.push(`<tr class="clk" data-ttday="${d0}"><td>${prettyDay(ymd(d0))}</td><td class="num">${Fd.ideal}</td><td class="num">${Fd.spoken}</td><td class="num ${Fd.pct!=null&&Fd.pct>=90?'yes':Fd.pct!=null&&Fd.pct<60?'no':''}">${Fd.pct!=null?Fd.pct+'%':'\u2014'}</td><td class="num">${Td.junkPct!=null?Math.round(Td.junkPct*100)+'%':'\u2014'}</td><td class="num">${Td.connRate!=null?Math.round(Td.connRate*100)+'%':'\u2014'}</td></tr>`);}
    detail=`<div class="sec"><div class="sechead"><h2 style="font-size:15px">Day-by-day \u00b7 ${fm}</h2><span class="meta">click a day to zoom in</span></div><div class="card"><table><thead><tr><th>Day</th><th>Owed</th><th>Spoken</th><th>Done %</th><th>Junk</th><th>Connect</th></tr></thead><tbody>${tr.join('')||'<tr><td colspan="6" style="color:var(--muted);padding:18px">No activity.</td></tr>'}</tbody></table></div></div>`;}
  panel.innerHTML=`<div class="sechead"><h2>Talk-Time</h2><span class="meta">demand \u00b7 ideal vs spoken \u00b7 rankings \u00b7 ${fm||'all FMs'}</span></div>
    <div class="toolrow">
      <label>View</label><select id="ttMode">${['day','week','month','range'].map(m=>`<option value="${m}" ${p.mode===m?'selected':''}>${m[0].toUpperCase()+m.slice(1)}</option>`).join('')}</select>
      ${ttControl(p)}
      <label>FM</label><select id="ttFm"><option value="">All FMs</option>${fms.map(f=>`<option ${f===SEL.ttfm?'selected':''}>${f}</option>`).join('')}</select>
      <div class="spacer"></div><button class="mini" id="ttMoreBtn">${SEL.ttMore?'Hide R2M & MV medians':'Show R2M & MV medians'}</button> <span style="font-size:12px;color:var(--muted);margin-left:8px">standards in Settings</span></div>
    ${warn}
    <div class="sec"><div class="sechead"><h2 style="font-size:15px">Rankings</h2><span class="meta">by fulfilment \u00b7 ${periodLabelTT(p)}</span></div>${rankTbl}</div>
    ${detail}
    <div class="sec grid2"><div><div class="sechead"><h2 style="font-size:15px">Today\u2019s requirement</h2><span class="meta">${fm||'all FMs'} \u00b7 current bucket</span></div>${reqTbl}</div>
    <div><div class="sechead"><h2 style="font-size:15px">Ideal vs spoken</h2><span class="meta">${fm||'all FMs'} \u00b7 ${periodLabelTT(p)}</span></div>${reckTbl}</div></div>`;
  $('#ttMode').addEventListener('change',e=>setTtMode(e.target.value));
  const wd=$('#ttDaySel');if(wd)wd.addEventListener('change',e=>{const d=+e.target.value;SEL.tt={mode:'day',start:d,end:addDays(d,1)};renderTalkTime();});
  const ww=$('#ttWeekSel');if(ww)ww.addEventListener('change',e=>{const w=+e.target.value;SEL.tt={mode:'week',start:w,end:addDays(w,7)};renderTalkTime();});
  const wm=$('#ttMonthSel');if(wm)wm.addEventListener('change',e=>{const m=+e.target.value;SEL.tt={mode:'month',start:m,end:monthEnd(m)};renderTalkTime();});
  const wa=$('#ttApply');if(wa)wa.addEventListener('click',()=>{const f=$('#ttFrom').value,tt=$('#ttTo').value;if(f&&tt&&dayToMs(f)<=dayToMs(tt)){SEL.tt={mode:'range',start:dayToMs(f),end:addDays(dayToMs(tt),1)};renderTalkTime();}else toast('Pick a valid range');});
  $('#ttFm').addEventListener('change',e=>{SEL.ttfm=e.target.value;renderTalkTime();});const mb=$('#ttMoreBtn');if(mb)mb.addEventListener('click',()=>{SEL.ttMore=!SEL.ttMore;renderTalkTime();});
  panel.querySelectorAll('tr[data-ttfm]').forEach(tr=>tr.addEventListener('click',e=>{if(e.target.closest('[data-junk],[data-cr]'))return;SEL.ttfm=decodeURIComponent(tr.dataset.ttfm);renderTalkTime();}));
  panel.querySelectorAll('[data-cr]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();openTtMissed(decodeURIComponent(el.dataset.cr));}));
  panel.querySelectorAll('[data-ttg]').forEach(el=>el.addEventListener('click',()=>openTtLeads(SEL.ttfm||'',el.dataset.ttg)));
  panel.querySelectorAll('tr[data-ttday]').forEach(tr=>tr.addEventListener('click',()=>{const d=+tr.dataset.ttday;SEL.tt={mode:'day',start:d,end:addDays(d,1)};renderTalkTime();}));}
function periodLabelTT(p){if(p.mode==='day')return prettyDay(ymd(p.start));if(p.mode==='week')return prettyDay(ymd(p.start))+' \u2013 '+prettyDay(ymd(addDays(p.end,-1)));if(p.mode==='month')return new Date(p.start).toLocaleDateString('en-GB',{month:'long',year:'numeric'});return prettyDay(ymd(p.start))+' \u2013 '+prettyDay(ymd(addDays(p.end,-1)));}
function openTtLeads(fm,g){const C=cfg();const p=ttPeriod();const T=ttStats(fm,p.start,p.end);const R=T.S[g];const lb=(TT_GROUPS.find(x=>x[0]===g)||['',''])[1];
  const items=Object.keys(R.connLeads).map(k=>({k,lead:CACHE.leads[k],min:R.connLeads[k]/60})).sort((a,b)=>a.min-b.min);
  const idealPer=ttStd(C,g);
  const body=items.map(it=>{const short=it.min<idealPer;return `<tr class="clk" data-tl="${it.k}"><td>${(it.lead&&it.lead.name)||'\u2014'}</td><td class="num">${(it.lead&&it.lead.phone)||it.k}</td><td>${(it.lead&&it.lead.status)||'\u2014'}</td><td class="num">${idealPer}m</td><td class="num ${short?'no':'yes'}">${fmtDur(it.min*60)}</td><td>${(it.lead&&it.lead.ass)||'\u2014'}</td></tr>`;}).join('');
  $('#mlTitle').textContent=(fm||'All FMs')+' \u00b7 '+lb+' \u00b7 spoken ('+items.length+' leads)';
  $('#mlBody').innerHTML=items.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>Now</th><th>Ideal</th><th>Spoken</th><th>FM</th></tr></thead><tbody>${body}</tbody></table><div style="padding:10px 16px;font-size:12px;color:var(--muted)">Shortest-served first. Click a lead for their full call history.</div>`:`<div style="padding:24px;color:var(--muted)">No connected calls in this stage for the period.</div>`;
  $('#leadModal').classList.add('show');
  $('#mlBody').querySelectorAll('tr[data-tl]').forEach(tr=>tr.addEventListener('click',()=>{TL_BACK=()=>openTtLeads(fm,g);openLeadTimeline(tr.dataset.tl);}));}
function openTtJunk(fm){const C=cfg();const p=ttPeriod();const T=ttStats(fm,p.start,p.end);
  const items=T.junkList.slice().sort((a,b)=>a.dur-b.dur);
  const body=items.map(it=>`<tr class="clk" data-tl="${it.k}"><td>${(it.lead&&it.lead.name)||'\u2014'}</td><td class="num">${(it.lead&&it.lead.phone)||it.k}</td><td>${(TT_GROUPS.find(x=>x[0]===it.g)||['','other'])[1]}</td><td class="num">${fmtDur(it.dur)}</td><td class="num">${new Date(it.t).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td></tr>`).join('');
  $('#mlTitle').textContent=(fm||'All FMs')+' \u00b7 junk calls under '+C.ttJunk+'s ('+items.length+')';
  $('#mlBody').innerHTML=items.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>Stage</th><th>Duration</th><th>When</th></tr></thead><tbody>${body}</tbody></table><div style="padding:10px 16px;font-size:12px;color:var(--muted)">Connected but barely spoken. Click a lead for the full history.</div>`:`<div style="padding:24px;color:var(--muted)">No junk calls \u2014 clean day.</div>`;
  $('#leadModal').classList.add('show');
  $('#mlBody').querySelectorAll('tr[data-tl]').forEach(tr=>tr.addEventListener('click',()=>{TL_BACK=()=>openTtJunk(fm);openLeadTimeline(tr.dataset.tl);}));}
function openTtMissed(fm){const p=ttPeriod();const T=ttStats(fm,p.start,p.end);
  const byLead={};for(const it of T.missList){const o=byLead[it.k]||(byLead[it.k]={lead:it.lead,n:0,last:0,g:it.g});o.n++;if(it.t>o.last)o.last=it.t;}
  const items=Object.values(byLead).sort((a,b)=>b.n-a.n);
  const body=items.map(it=>`<tr class="clk" data-tl="${it.lead.key||it.lead.phone}"><td>${it.lead.name||'\u2014'}</td><td class="num">${it.lead.phone}</td><td>${(TT_GROUPS.find(x=>x[0]===it.g)||['','other'])[1]}</td><td class="num">${it.n}</td><td class="num">${new Date(it.last).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td></tr>`).join('');
  $('#mlTitle').textContent=(fm||'All FMs')+' \u00b7 attempted but not connected ('+items.length+' leads)';
  $('#mlBody').innerHTML=items.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>Stage</th><th>Attempts</th><th>Last try</th></tr></thead><tbody>${body}</tbody></table><div style="padding:10px 16px;font-size:12px;color:var(--muted)">Most-tried first \u2014 these numbers are not picking up. Click a lead for the full history.</div>`:`<div style="padding:24px;color:var(--muted)">Every attempt connected.</div>`;
  $('#leadModal').classList.add('show');
  $('#mlBody').querySelectorAll('tr[data-tl]').forEach(tr=>tr.addEventListener('click',()=>{TL_BACK=()=>openTtMissed(fm);openLeadTimeline(tr.dataset.tl);}));}
/* ================= WORKING HOURS ================= */
function whPeriod(){if(!SEL.wh){const d=latestSpeedDay();SEL.wh={mode:'day',start:d,end:addDays(d,1)};}return SEL.wh;}
function setWhMode(m){if(m==='day'){const d=latestSpeedDay();SEL.wh={mode:'day',start:d,end:addDays(d,1)};}
  else if(m==='week'){const ws=latestWeek();SEL.wh={mode:'week',start:ws,end:addDays(ws,7)};}
  else if(m==='month'){const ms=monthOptions().slice(-1)[0];SEL.wh={mode:'month',start:ms,end:monthEnd(ms)};}
  else{const ws=latestWeek();SEL.wh={mode:'range',start:ws,end:addDays(ws,7)};}renderWorkHours();}
function whControl(p){
  if(p.mode==='day'){const days=speedDayOptions().slice(-60).reverse();if(!days.includes(p.start))days.unshift(p.start);return `<select id="whDaySel" class="selmono">${days.map(d=>`<option value="${d}" ${d===p.start?'selected':''}>${prettyDay(ymd(d))}</option>`).join('')}</select>`;}
  if(p.mode==='week'){const weeks=weekOptions();return `<select id="whWeekSel" class="selmono">${weeks.map(w=>`<option value="${w}" ${w===p.start?'selected':''}>${prettyDay(ymd(w))} – ${prettyDay(ymd(addDays(w,6)))}</option>`).join('')}</select>`;}
  if(p.mode==='month'){const months=monthOptions();return `<select id="whMonthSel">${months.map(m=>`<option value="${m}" ${m===p.start?'selected':''}>${new Date(m).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`).join('')}</select>`;}
  return `<input type="date" id="whFrom" value="${ymd(p.start)}"> <span style="color:var(--muted)">to</span> <input type="date" id="whTo" value="${ymd(addDays(p.end,-1))}"> <button class="mini" id="whApply">Apply</button>`;}
function whFirstLast(fm,start,end){let first=null,last=null;
  for(const k in CACHE.leads){const l=CACHE.leads[k];if(/^telecaller/i.test(l.ass||''))continue;if(fm&&(l.ass||'—')!==fm)continue;
    for(const e of (l._events||[])){if(e.k!=='call'||e.dir!=='out'||e.t==null)continue;const aT=ttAdj(e.t);if(aT<start||aT>=end)continue;
      if(first==null||e.t<first)first=e.t;if(last==null||e.t>last)last=e.t;}}
  return {first,last};}
function whTime(t){if(t==null)return '\u2014';const d=new Date(t);if(d.getHours()===0&&d.getMinutes()===0)return '\u2014 (time missing)';return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function renderWorkHours(){const panel=$('#workhours');if(!panel)return;
  if(!hasData()){panel.innerHTML=emptyState('Upload lead data first','Working Hours shows when each FM actually worked the phone: active hours, first and last call, and the hour-by-hour map.');wireEmpty();return;}
  const C=cfg();const p=whPeriod();const start=p.start,end=p.end;const fm=SEL.whfm||'';
  const fms=apFMs();
  const hasCalls=CACHE.batches.some(b=>b.type==='calllog'&&dayToMs(b.date)>=start&&dayToMs(b.date)<end);
  const warn=hasCalls?'':'<div class="banner" style="background:#FEF3E2;border-color:#F0C36D;color:#7A4F10">\u26a0 No call-details file uploaded for this period \u2014 upload CALLDETAILS in Data input.</div>';
  /* summary per FM */
  const rows=fms.map(f=>{const T=ttStats(f,start,end);const fl=whFirstLast(f,start,end);return {fm:f,T,fl};}).filter(r=>r.T.attAll>0);
  rows.sort((a,b)=>(b.T.active/(b.T.totalSlots||1))-(a.T.active/(a.T.totalSlots||1)));
  const sumRows=rows.map(r=>{const T=r.T;const pctA=T.totalSlots?T.active/T.totalSlots:0;
    return `<tr class="clk" data-whfm="${encodeURIComponent(r.fm)}"><td>${r.fm}</td>
      <td class="num ${pctA>=0.7?'yes':pctA<0.4?'no':''}">${T.active}/${T.totalSlots}</td>
      <td class="num">${T.attAll}</td><td class="num">${T.connAll}</td><td class="num">${T.spokenAll}m</td>
      <td class="num">${whTime(r.fl.first)}</td><td class="num">${whTime(r.fl.last)}</td></tr>`;}).join('');

function computeTargets(start,end,filter){const C=cfg();
  const mvA=addDays(start,-7),mvB=addDays(end,-7),saA=addDays(start,-14),saB=addDays(end,-14);
  const leads=activeLeads(filter);const perFM={};const now=todayStart();
  const ensure=fm=>perFM[fm]||(perFM[fm]={fm,createdThis:0,createdLast:0,createdTwo:0,mvAch:0,saleAch:0,
    agrOnTime:0,agrPending:0,agrOverdue:0,agrLate:0,payOnTime:0,payPending:0,payOverdue:0,payLate:0,loiCount:0,agrCount:0,wonCount:0});
  for(const l of leads){if(/^telecaller/i.test(l.ass))continue;const f=ensure(l.ass||'—');
    if(inRange(l.createdOn,start,end))f.createdThis++;
    if(inRange(l.createdOn,mvA,mvB))f.createdLast++;
    if(inRange(l.createdOn,saA,saB))f.createdTwo++;
    if(inRange(l.ms.marketVisit,start,end))f.mvAch++;
    if(inRange(l.ms.loi,start,end))f.saleAch++;
    if(l.ms.loi){f.loiCount++;const due=addDays(l.ms.loi,C.agreeDays);
      if(l.ms.agreement){if(l.ms.agreement<=due)f.agrOnTime++;else f.agrLate++;}else if(now<=due)f.agrPending++;else f.agrOverdue++;}
    if(l.ms.agreement){f.agrCount++;const due=addDays(l.ms.agreement,C.payDays);
      if(l.ms.won){if(l.ms.won<=due)f.payOnTime++;else f.payLate++;}else if(now<=due)f.payPending++;else f.payOverdue++;}
    if(l.ms.won)f.wonCount++;}
  for(const fm in perFM){const f=perFM[fm];f.mvTarget=roundT(f.createdLast/C.mvRatio);f.saleTarget=roundT(f.createdTwo/C.saleRatio);}
  return perFM;}
function totalize(perFM){const t={createdThis:0,createdLast:0,createdTwo:0,mvTarget:0,mvTargetTD:0,mvAch:0,saleTarget:0,saleTargetTD:0,saleAch:0,agrOnTime:0,agrPending:0,agrOverdue:0,agrLate:0,payOnTime:0,payPending:0,payOverdue:0,payLate:0,loiCount:0,agrCount:0,wonCount:0,fmMVok:0,fmSaleok:0,fmCount:0};

function drillTree(start,end){const C=cfg();const mvA=addDays(start,-7),mvB=addDays(end,-7),saA=addDays(start,-14),saB=addDays(end,-14);
  const tree={};for(const ph in CACHE.leads){const l=CACHE.leads[ph];
    if(SEL.fm&&(l.ass||'—')!==SEL.fm)continue;

    const st=distState(l.dist||'(no district)');const d=l.dist||'(no district)';
    const S=tree[st]||(tree[st]={created:0,last:0,two:0,mv:0,sale:0,districts:{}});
    const D=S.districts[d]||(S.districts[d]={created:0,last:0,two:0,mv:0,sale:0,fm:distFM(d)});
    if(inRange(l.createdOn,start,end)){S.created++;D.created++;}
    if(inRange(l.createdOn,mvA,mvB)){S.last++;D.last++;}
    if(inRange(l.createdOn,saA,saB)){S.two++;D.two++;}
    if(inRange(l.ms.marketVisit,start,end)){S.mv++;D.mv++;}
    if(inRange(l.ms.loi,start,end)){S.sale++;D.sale++;}}
  let india={created:0,last:0,two:0,mv:0,sale:0};for(const st in tree){india.created+=tree[st].created;india.last+=tree[st].last;india.two+=tree[st].two;india.mv+=tree[st].mv;india.sale+=tree[st].sale;}
  const mvT=n=>roundT(n/C.mvRatio),saleT=n=>roundT(n/C.saleRatio);

    if(expanded[ke]){for(const d of Object.keys(S.districts).sort()){const D=S.districts[d];
      h+=`<div class="trow lv2"><span class="tname">${d} <span class="fmtag">· ${D.fm}</span></span><span class="rt num">${D.created}</span><span class="rt num">${D.mv}</span><span class="rt num h5">${mvT(D.last)}</span><span class="rt num">${D.sale}</span><span class="rt num c5">${saleT(D.two)}</span></div>`;}}}}
  return h+'</div>';}
function dateWarnBanner(){const has=CACHE.batches.some(b=>b.type==='status'||b.type==='opening'||b.type==='daily');const hasMIS=Object.keys(CACHE.manual||{}).length>0;

/* ---- SPEED ---- */
function classifyLive(l,C){if(l.firstCall==null)return 'untouched';const gap=(l.firstCall-l.createdOn)/60000;
  if(ymd(l.firstCall)!==ymd(l.createdOn))return 'nextday';if(gap<=C.target5)return 'on5';if(gap<=C.grace15)return 'in15';return 'late';}
function dayStartMs(ms){const d=new Date(ms);d.setHours(0,0,0,0);return d.getTime();}
function speedCohortDay(l,C){const dd=new Date(l.createdOn);const hh=dd.getHours()+dd.getMinutes()/60;const live=hh>=C.workStart&&hh<C.cutoff;
  if(live)return{cd:dayStartMs(l.createdOn),live:true};if(hh>=C.cutoff)return{cd:addDays(dayStartMs(l.createdOn),1),live:false};return{cd:dayStartMs(l.createdOn),live:false};}
function speedDayOptions(){const C=cfg();const set=new Set();for(const ph in CACHE.leads){const l=CACHE.leads[ph];if(!l.createdOn)continue;set.add(speedCohortDay(l,C).cd);}return[...set].sort((a,b)=>a-b);}
function latestSpeedDay(){const C=cfg();const byday={};for(const ph in CACHE.leads){const l=CACHE.leads[ph];if(!l.createdOn||/^telecaller/i.test(l.ass||''))continue;const co=speedCohortDay(l,C);if(co.live)byday[co.cd]=(byday[co.cd]||0)+1;}
  const days=Object.keys(byday).map(Number).sort((a,b)=>b-a);if(days.length)return days[0];const all=speedDayOptions();return all.length?all[all.length-1]:dayStartMs(Date.now());}
function speedPeriod(){if(!SEL.sp){const d=latestSpeedDay();SEL.sp={mode:'day',start:d,end:addDays(d,1)};}return SEL.sp;}
function setSpeedMode(m){if(m==='day'){const d=latestSpeedDay();SEL.sp={mode:'day',start:d,end:addDays(d,1)};}
  else if(m==='week'){const ws=latestWeek();SEL.sp={mode:'week',start:ws,end:addDays(ws,7)};}
  else if(m==='month'){const ms=monthOptions().slice(-1)[0];SEL.sp={mode:'month',start:ms,end:monthEnd(ms)};}
  else{const ws=latestWeek();SEL.sp={mode:'range',start:ws,end:addDays(ws,7)};}renderSpeed();}
function speedControl(p){
  if(p.mode==='day'){const days=speedDayOptions().slice(-60).reverse();if(!days.includes(p.start))days.unshift(p.start);return `<select id="spDay" class="selmono">${days.map(d=>`<option value="${d}" ${d===p.start?'selected':''}>${prettyDay(ymd(d))}</option>`).join('')}</select>`;}
  if(p.mode==='week'){const weeks=weekOptions();return `<select id="spWeek" class="selmono">${weeks.map(w=>`<option value="${w}" ${w===p.start?'selected':''}>${prettyDay(ymd(w))} – ${prettyDay(ymd(addDays(w,6)))}</option>`).join('')}</select>`;}
  if(p.mode==='month'){const months=monthOptions();return `<select id="spMonth">${months.map(m=>`<option value="${m}" ${m===p.start?'selected':''}>${new Date(m).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`).join('')}</select>`;}
  return `<input type="date" id="spFrom" value="${ymd(p.start)}"> <span style="color:var(--muted)">to</span> <input type="date" id="spTo" value="${ymd(addDays(p.end,-1))}"> <button class="mini" id="spApply">Apply</button>`;}
let SPD={fm:{},tel:{}};
function speedAggregate(start,end){const C=cfg();const fm={},tel={};
  const blank=()=>({total:0,on5:0,in15:0,late:0,nextday:0,untouched:0,ahT:0,ahD:0,eng:0,leads:{on5:[],in15:[],late:[],nextday:[],untouched:[],ah:[],eng:[]}});
  for(const ph in CACHE.leads){const l=CACHE.leads[ph];if(!l.createdOn)continue;
    const co=speedCohortDay(l,C);if(!(co.cd>=start&&co.cd<end))continue;
    const isT=/^telecaller/i.test(l.ass);const name=l.ass||'—';
    if(SEL.sfm&&!isT&&name!==SEL.sfm)continue;
    const g=isT?tel:fm;const a=g[name]||(g[name]=blank());
    if(l.dur&&l.dur>=1500){a.eng++;a.leads.eng.push(l);}
    if(co.live){a.total++;const b=classifyLive(l,C);a[b]++;a.leads[b].push(l);}else{a.ahT++;if(l.firstCall!=null)a.ahD++;a.leads.ah.push(l);}}
  SPD={fm,tel};return {fm,tel};}
function renderSpeed(){const panel=$('#speed');

  const fmT=sumG(fm);const pct=(n,d)=>d?Math.round(n/d*100):0;const grand=fmT.total+fmT.ahT;
  const fmsAll=[...new Set(Object.values(CACHE.leads).map(l=>l.ass).filter(a=>a&&!/^telecaller/i.test(a)))].sort();
  const kpi=(k,l,v,s,c)=>`<div class="kpi kpiclick ${c==='g'?'good':c==='a'?'warn':c==='r'?'bad':''}" data-kpi="${k}"><div class="lab">${l}</div><div class="val num">${v}</div><div class="sub">${s}</div></div>`;
  panel.innerHTML=`
    <div class="toolrow">
      <label>View</label><select id="spMode">${['day','week','month','range'].map(m=>`<option value="${m}" ${p.mode===m?'selected':''}>${m[0].toUpperCase()+m.slice(1)}</option>`).join('')}</select>
      ${speedControl(p)}
      <label>FM</label><select id="spFm"><option value="">All FMs</option>${fmsAll.map(f=>`<option ${f===SEL.sfm?'selected':''}>${f}</option>`).join('')}</select>

function daysInStage(l){const so=l.statusOn||l.createdOn;return so!=null?Math.floor((todayStart()-so)/86400000):null;}

/* ---- DATA INPUT MODULE ---- */
const UP_SLOTS=[
  {type:'daily',        label:'Master report',        desc:'ALLREPORT — every lead with its current status. The backbone.', req:true},
  {type:'statuschange', label:'Status change report', desc:'STATUSCHANGEREPORT — every stage move that day'},
  {type:'calllog',      label:'Call details',         desc:'CALLDETAILS — every call, its duration & whether it connected'},
  {type:'notelog',      label:'User notes',           desc:'USERNOTEREPORT — notes the FMs logged'},
  {type:'walog',        label:'WhatsApp',             desc:'WATSUPREPORT — WhatsApp messages sent'},

function parseForType(type,text){
  if(type==='statuschange')return parseStatusLog(text);
  if(type==='calllog')return parseCallLog(text);
  if(type==='notelog')return parseNoteLog(text);
  if(type==='walog')return parseWaLog(text);
  return parseBatch(text); /* daily / opening / created — bucket format */
}
function batchFor(date,type){return CACHE.batches.find(b=>b.date===date&&b.type===type);}
function coveredDays(){return new Set(CACHE.batches.filter(b=>b.type==='daily').map(b=>b.date));}
function uploadSlot(date,type,file){
  if(!date){toast('Pick a date first');return;}
  if(!/\.csv$/i.test(file.name)){toast('Choose a .csv export');return;}
  const rd=new FileReader();
  rd.onload=()=>{try{const rows=parseForType(type,rd.result);
    CACHE.batches=CACHE.batches.filter(b=>!(b.date===date&&b.type===type)); /* one per day+type: re-upload replaces */
    CACHE.batches.push({id:'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),date,type,rows,uploadedAt:Date.now(),name:file.name});
    rebuild();persist();toast((TYPE_LABEL[type]||type)+' loaded for '+prettyDay(date)+' — '+rows.length.toLocaleString()+' rows');render();
  }catch(e){toast(e.message||'Could not read that file');}};
  rd.readAsText(file);
}
function delDay(date){if(!confirm('Delete ALL reports uploaded for '+prettyDay(date)+'?\nThe whole picture rebuilds without that day.'))return;
  CACHE.batches=CACHE.batches.filter(b=>b.date!==date);rebuild();persist();toast('Removed '+prettyDay(date));render();}

  rebuild();persist();toast('All data deleted — upload a fresh day to begin');render();}
function renderData(){const panel=$('#data');const today=ymd(todayStart());
  const sel=SEL.upDate||today;
  const hist=UP_LOG.length?`<div class="card" style="margin-bottom:12px;padding:10px 14px"><div style="font-weight:600;font-size:13px;margin-bottom:6px">Upload results (this session)</div>${UP_LOG.map(x=>`<div style="font-size:12px;line-height:1.8"><span style="font-weight:700;color:${x.ok?'var(--green,#1C6B3C)':'var(--red,#C0392B)'}">${x.ok?'\u2713':'\u2717'}</span> ${esc(x.text)} <span style="color:var(--muted)">\u00b7 ${new Date(x.at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span></div>`).join('')}</div>`:'';
  const LOGTYPES={statuschange:1,calllog:1,notelog:1,walog:1};
  const slots=UP_SLOTS.map(s=>{const b=batchFor(sel,s.type);const done=!!b;
    let status;

    else if(LOGTYPES[s.type]){const all=CACHE.batches.filter(x=>x.type===s.type&&!String(x.id).startsWith('seed')).map(x=>x.date).sort();
      if(all.length)status=`<span style="color:#B7791F;font-size:12px">✓ accepted — data covers ${prettyDay(all[0])}${all.length>1?' – '+prettyDay(all[all.length-1]):''}, but no rows dated ${prettyDay(sel)} (the export runs to yesterday)</span>`;
      else status=`<span class="norow">not uploaded</span>`;}

function detectCsvType(text){try{const firstLines=text.slice(0,6000);const rows=parseCSV(firstLines);if(!rows.length)return null;
  const H=rows[0].map(h=>(''+h).toLowerCase().replace(/[^a-z0-9]/g,''));const has=n=>H.indexOf(n)>=0;
  if(has('fromstatus')&&has('tostatus'))return 'statuschange';
  if(has('whatsappmessagetype')||has('whatsappmessage'))return 'walog';
  if(has('usernote'))return 'notelog';
  if(has('calltype')&&has('phone'))return 'calllog';
  if(has('status')&&has('phone')&&has('assigneename'))return 'daily';
  return null;}catch(_){return null;}}
function logSplitAdd(type,rows,fname,fallbackDate){const byDay={};let orphans=[];
  for(const r of rows){if(r.at!=null){const d=ymd(dayStartMs(r.at));(byDay[d]||(byDay[d]=[])).push(r);}else orphans.push(r);}
  if(orphans.length){const fb=fallbackDate||Object.keys(byDay).sort().slice(-1)[0];if(fb)(byDay[fb]||(byDay[fb]=[])).push(...orphans);}
  const daysList=Object.keys(byDay).sort();if(!daysList.length)throw new Error('No dated rows found in the file');
  for(const d of daysList){CACHE.batches=CACHE.batches.filter(b=>!(b.type===type&&b.date===d&&!String(b.id).startsWith('seed')));
    CACHE.batches.push({id:'lg'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),date:d,type:type,rows:byDay[d],uploadedAt:Date.now(),name:fname+' ('+d+')'});}
  return {n:rows.length,days:daysList};}
function scSplitAdd(rows,fname,fallbackDate){const byDay={};let orphans=[];
  for(const r of rows){if(r.at!=null){const d=ymd(dayStartMs(r.at));(byDay[d]||(byDay[d]=[])).push(r);}else orphans.push(r);}
  if(orphans.length){const fb=fallbackDate||Object.keys(byDay).sort().slice(-1)[0];if(fb)(byDay[fb]||(byDay[fb]=[])).push(...orphans);}
  const daysList=Object.keys(byDay).sort();if(!daysList.length)throw new Error('No dated status changes found in the file');
  for(const d of daysList){CACHE.batches=CACHE.batches.filter(b=>!(b.type==='statuschange'&&b.date===d&&!String(b.id).startsWith('seed')));
    CACHE.batches.push({id:'sc'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),date:d,type:'statuschange',rows:byDay[d],uploadedAt:Date.now(),name:fname+' ('+d+')'});}
  return {n:rows.length,days:daysList};}
function addBatches(list,date,type){const files=[...list].filter(f=>/\.csv$/i.test(f.name));if(!files.length){toast('Choose a .csv export');return;}
  let done=0,err=null,added=0,msgs=[];
  files.forEach(file=>{const rd=new FileReader();rd.onload=()=>{try{
    const sniffed=detectCsvType(rd.result);const useType=sniffed||type;
    const LOGT={statuschange:'status changes',calllog:'calls',notelog:'notes',walog:'WhatsApp messages'};
    if(LOGT[useType]){const r=logSplitAdd(useType,parseForType(useType,rd.result),file.name,date);added++;msgs.push(r.n+' '+LOGT[useType]+' ('+r.days.length+' day'+(r.days.length>1?'s':'')+')');}
    else{if(!date)throw new Error('Pick a date first for '+file.name);
      const rows=parseForType(useType,rd.result);
      CACHE.batches=CACHE.batches.filter(b=>!(b.date===date&&b.type===useType));
      CACHE.batches.push({id:'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),date,type:useType,rows,uploadedAt:Date.now(),name:file.name});added++;
      if(sniffed&&sniffed!==type)msgs.push(file.name+' recognised as '+useType);}
    upLog(true,file.name+' \u2192 accepted');}catch(e){const hint=(detectCsvType(rd.result)==null)?' (columns don\u2019t match any known TeleCRM report \u2014 header may have changed)':'';
      const m=file.name+': '+e.message+hint;err=(err?err+' \u00b7 ':'')+m;upLog(false,'REJECTED \u2014 '+m);}
    if(++done===files.length){rebuild();persist();toast(err?('Upload REJECTED \u2014 '+err):('Added '+added+' file(s)'+(msgs.length?' — '+msgs.join(' · '):'')));render();}};rd.readAsText(file);});}

    if(lp===d){if(!exact||(l.status&&l.status!=='Lost'))exact=l;} else if(!fuzzy&&(lp.endsWith(d)||d.endsWith(lp)))fuzzy=l;}
  return exact||fuzzy;}
