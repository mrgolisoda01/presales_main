function scDist(c){const l=CACHE.leads[c.lid||c.ph];return c.dist||(l&&l.dist)||'—';}
function scWhen(c){if(c.at==null)return '—';const d=new Date(c.at);return c.atT?d.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function wireScUpload(){const b=$('#scUpBtn');if(b)b.addEventListener('click',()=>$('#scFile').click());
  const f=$('#scFile');if(f)f.addEventListener('change',e=>{scAddLog(e.target.files[0],$('#scUpDate').value);e.target.value='';});}
function scAddLog(file,date){if(!file){return;}
  const rd=new FileReader();rd.onload=()=>{try{const rows=parseStatusLog(rd.result);
    /* split by the day each change actually happened \u2014 handles multi-day 6AM exports */
    const byDay={};let orphans=[];
    for(const r of rows){if(r.at!=null){const d=ymd(dayStartMs(r.at));(byDay[d]||(byDay[d]=[])).push(r);}else orphans.push(r);}
    if(orphans.length){const fallback=date||Object.keys(byDay).sort().slice(-1)[0];if(fallback)(byDay[fallback]||(byDay[fallback]=[])).push(...orphans);}
    const daysList=Object.keys(byDay).sort();
    if(!daysList.length){toast('No dated status changes found in the file');return;}
    for(const d of daysList){
      CACHE.batches=CACHE.batches.filter(b=>!(b.type==='statuschange'&&b.date===d&&!String(b.id).startsWith('seed')));
      CACHE.batches.push({id:'sc'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),date:d,type:'statuschange',rows:byDay[d],uploadedAt:Date.now(),name:file.name+' ('+d+')'});}
    rebuild();persist();
    toast(rows.length+' status changes added across '+daysList.length+' day'+(daysList.length>1?'s':'')+' ('+prettyDay(daysList[0])+(daysList.length>1?' \u2013 '+prettyDay(daysList[daysList.length-1]):'')+')');
    upLog(true,file.name+' \u2192 accepted');render();}catch(e){upLog(false,'REJECTED \u2014 '+file.name+': '+e.message);toast('Upload REJECTED \u2014 '+file.name+': '+e.message);render();}};rd.readAsText(file);}
function openScStageLeads(kind,stage,sub){const p=scPeriod();const fm=SEL.scfm||'';
  if(kind==='in'||kind==='out'){const all=kind==='in'?inboundTo(stage,p.start,p.end,fm):changesIn(p.start,p.end,fm).filter(c=>c.from===stage);
    const otherOf=c=>kind==='in'?c.from:c.to;
    const others=FUNNEL.filter(s=>all.some(c=>otherOf(c)===s)).concat([...new Set(all.map(otherOf))].filter(s=>!FUNNEL.includes(s)));
    const sf=sub||'';const shown=sf?all.filter(c=>otherOf(c)===sf):all;
    const dd=`<div class="toolrow" style="margin:0 0 12px"><label>${kind==='in'?'Came from':'Went to'}</label><select id="scSub"><option value="">All (${all.length})</option>${others.map(s=>`<option value="${encodeURIComponent(s)}" ${s===sf?'selected':''}>${s} (${all.filter(c=>otherOf(c)===s).length})</option>`).join('')}</select></div>`;
    const body=shown.map(c=>`<tr><td>${scName(c)}</td><td class="num">${c.ph}</td><td>${scDist(c)}</td><td>${c.from} → ${c.to}</td><td>${scWhen(c)}</td><td>${c.ass||'—'}</td></tr>`).join('');
    $('#mlTitle').textContent=stage+(kind==='in'?' · moved in':' · moved out')+(sf?(kind==='in'?' · from '+sf:' · to '+sf):'')+' ('+shown.length+')';
    $('#mlBody').innerHTML=dd+(shown.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>District</th><th>Transition</th><th>When</th><th>FM</th></tr></thead><tbody>${body}</tbody></table>`:`<div style="padding:24px;color:var(--muted)">No leads.</div>`);
    $('#leadModal').classList.add('show');
    const ss=$('#scSub');if(ss)ss.addEventListener('change',e=>openScStageLeads(kind,stage,e.target.value?decodeURIComponent(e.target.value):''));
    return;}
  const T=kind==='open'?p.start:p.end;
  const leads=[];for(const ph in CACHE.leads){const l=CACHE.leads[ph];if(/^telecaller/i.test(l.ass||''))continue;if(fm&&(l.ass||'—')!==fm)continue;if(statusAtT(l,T)===stage)leads.push(l);}
  const body=leads.map(l=>`<tr><td>${l.name||'—'}</td><td class="num">${l.phone}</td><td>${l.dist||'—'}</td><td>${l.ass||'—'}</td></tr>`).join('');
  $('#mlTitle').textContent=stage+(kind==='open'?' · opening':' · closing')+' ('+leads.length+')';
  $('#mlBody').innerHTML=leads.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>District</th><th>FM</th></tr></thead><tbody>${body}</tbody></table>`:`<div style="padding:24px;color:var(--muted)">No leads.</div>`;
  $('#leadModal').classList.add('show');}
function openScIntoLeads(stage){const p=scPeriod();const fm=SEL.scfm||'';const inb=inboundTo(stage,p.start,p.end,fm);
  const body=inb.map(c=>`<tr><td>${scName(c)}</td><td class="num">${c.ph}</td><td>${scDist(c)}</td><td>${c.from}</td><td>${scWhen(c)}</td><td>${c.ass||'—'}</td></tr>`).join('');
  $('#mlTitle').textContent='Moved into '+stage+' ('+inb.length+')';
  $('#mlBody').innerHTML=inb.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>District</th><th>From</th><th>When</th><th>FM</th></tr></thead><tbody>${body}</tbody></table>`:`<div style="padding:24px;color:var(--muted)">No leads.</div>`;
  $('#leadModal').classList.add('show');}

/* ---- ACTION PERFORMED (per-FM stage work review) ---- */
const AP_STAGES=['Fresh','Ready To Meet','Market Visit','Eligible - Interested','Try 1 Not Connected','Try 2 Not Connected','Try 3 Not Connected'];
function apLimit(s){return s==='Market Visit'?14:7;}
function apTouched(l,s,e){return (l._events||[]).some(x=>x.k==='call'&&x.dir==='out'&&x.t!=null&&x.t>=s&&x.t<e);}
function apConnEver(l){return (l._events||[]).some(x=>x.k==='call'&&((x.fb&&x.fb.toUpperCase()==='CONNECTED')||(x.dur&&x.dur>0)));}
function apInterested(l){return l.recap||/recaptur/i.test(l.status||'')||(l._events||[]).some(x=>x.k==='call'&&x.dir==='in');}
function apLongest(l){let m=0;(l._events||[]).forEach(x=>{if(x.k==='call'&&x.dur&&x.dur>m)m=x.dur;});return m;}
function apInStage(stage,fm){const o=[];for(const k in CACHE.leads){const l=CACHE.leads[k];if(/^telecaller/i.test(l.ass||''))continue;if(fm&&(l.ass||'—')!==fm)continue;if((l.status||'')!==stage)continue;o.push(l);}return o;}
/* period-correct: leads that were in the stage DURING the period (workload), not just currently */
function apEnteredDuring(l,stage,start,end){if(stage==='Fresh'&&l.createdOn!=null&&l.createdOn>=start&&l.createdOn<end)return true;
  return (l._changes||[]).some(c=>c.to===stage&&c.at!=null&&c.at>=start&&c.at<end);}
function apMovedOutDuring(l,stage,start,end){return (l._changes||[]).some(c=>c.from===stage&&c.at!=null&&c.at>=start&&c.at<end);}
function apWorkload(stage,fm,start,end){const out=[];for(const k in CACHE.leads){const l=CACHE.leads[k];if(/^telecaller/i.test(l.ass||''))continue;if(fm&&(l.ass||'—')!==fm)continue;
  if(statusAtT(l,start)===stage||apEnteredDuring(l,stage,start,end))out.push(l);}return out;}
function apStillIn(l,stage,end){return statusAtT(l,end)===stage;}
function apDaysInStageAt(l,end){const so=l.statusOn||l.createdOn;return so!=null?Math.floor((end-so)/86400000):null;}
function apWorked(l,stage,start,end){return apTouched(l,start,end)||apMovedOutDuring(l,stage,start,end);}
function apStuck(l,stage,end,lim){if(!apStillIn(l,stage,end))return false;const d=apDaysInStageAt(l,end);return d!=null&&d>lim;}
function apFMs(){return [...new Set(Object.values(CACHE.leads).map(l=>l.ass).filter(a=>a&&!/^telecaller/i.test(a)&&!/^ajay$/i.test(a.trim())))].sort();}
function apPeriod(){if(!SEL.ap){const d=latestSpeedDay();SEL.ap={mode:'day',start:d,end:addDays(d,1)};}return SEL.ap;}
function setApMode(m){if(m==='day'){const d=latestSpeedDay();SEL.ap={mode:'day',start:d,end:addDays(d,1)};}
  else if(m==='week'){const ws=latestWeek();SEL.ap={mode:'week',start:ws,end:addDays(ws,7)};}
  else if(m==='month'){const ms=monthOptions().slice(-1)[0];SEL.ap={mode:'month',start:ms,end:monthEnd(ms)};}
  else{const ws=latestWeek();SEL.ap={mode:'range',start:ws,end:addDays(ws,7)};}renderAction();}
function apControl(p){
  if(p.mode==='day'){const days=speedDayOptions().slice(-60).reverse();if(!days.includes(p.start))days.unshift(p.start);return `<select id="apDay" class="selmono">${days.map(d=>`<option value="${d}" ${d===p.start?'selected':''}>${prettyDay(ymd(d))}</option>`).join('')}</select>`;}
  if(p.mode==='week'){const weeks=weekOptions();return `<select id="apWeek" class="selmono">${weeks.map(w=>`<option value="${w}" ${w===p.start?'selected':''}>${prettyDay(ymd(w))} – ${prettyDay(ymd(addDays(w,6)))}</option>`).join('')}</select>`;}
  if(p.mode==='month'){const months=monthOptions();return `<select id="apMonth">${months.map(m=>`<option value="${m}" ${m===p.start?'selected':''}>${new Date(m).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`).join('')}</select>`;}
  return `<input type="date" id="apFrom" value="${ymd(p.start)}"> <span style="color:var(--muted)">to</span> <input type="date" id="apTo" value="${ymd(addDays(p.end,-1))}"> <button class="mini" id="apApply">Apply</button>`;}
function renderAction(){const panel=$('#action');if(!panel)return;
  if(!hasData()){panel.innerHTML=emptyState('Upload lead data first','Action Performed reviews each stage — touched vs not, stuck leads, and where leads moved.');wireEmpty();return;}
  const p=apPeriod();const start=p.start,end=p.end;const today=todayStart();const fm=SEL.apfm||'';
  const fmsAll=apFMs();
  const mine=[];for(const k in CACHE.leads){const l=CACHE.leads[k];if(/^telecaller/i.test(l.ass||''))continue;if(fm&&(l.ass||'—')!==fm)continue;mine.push(l);}
  const due=mine.filter(l=>l.nf!=null&&dayStartMs(l.nf)===today).length;
  const over=mine.filter(l=>l.nf!=null&&dayStartMs(l.nf)<today&&l.status!=='Won'&&l.status!=='Lost').length;
  const none=mine.filter(l=>l.nf==null&&l.status!=='Won'&&l.status!=='Lost').length;
  const cl=(s,m,v,extra)=>`<td class="num clkcell${extra||''}" data-st="${encodeURIComponent(s)}" data-m="${m}">${v}</td>`;
  const rows=AP_STAGES.map(s=>{const wl=apWorkload(s,fm,start,end);const lim=apLimit(s);
    const t=wl.filter(l=>apWorked(l,s,start,end)).length;
    const stag=wl.filter(l=>apStuck(l,s,end,lim)).length;
    const mo=wl.filter(l=>apMovedOutDuring(l,s,start,end)).length;
    const intr=wl.filter(apInterested).length;
    return `<tr><td>${s} <span class="terr">&gt;${lim}d</span></td>${cl(s,'in',wl.length)}${cl(s,'touched',t)}${cl(s,'untouched',wl.length-t)}${cl(s,'stagnant',stag,stag>0?' apred':'')}${cl(s,'movedout',mo)}${cl(s,'interested',intr)}${cl(s,'push',wl.length-intr)}</tr>`;}).join('');
  panel.innerHTML=`<div class="sechead"><h2>Action Performed</h2><span class="meta">stage-by-stage work review · ${fm||'all FMs'}</span></div>
    <div class="toolrow">
      <label>View</label><select id="apMode">${['day','week','month','range'].map(m=>`<option value="${m}" ${p.mode===m?'selected':''}>${m[0].toUpperCase()+m.slice(1)}</option>`).join('')}</select>
      ${apControl(p)}
      <label>FM</label><select id="apFm"><option value="">All FMs</option>${fmsAll.map(f=>`<option ${f===SEL.apfm?'selected':''}>${f}</option>`).join('')}</select>
      <div class="spacer"></div><span style="font-size:12px;color:var(--muted)">touched = outgoing call in period · stuck = over 7d (MV 14d)</span></div>
    <div class="sec"><div class="sechead" style="margin-bottom:6px"><h2 style="font-size:14px">Reminders</h2><span class="meta"><span class="clkcell" data-m="rem-due">${due} due today</span> · <span class="clkcell apred" data-m="rem-over">${over} overdue</span> · <span class="clkcell" data-m="rem-none">${none} no reminder</span></span></div>
      <div class="card"><table><thead><tr><th>Stage</th><th>In stage</th><th>Touched</th><th>Untouched</th><th>Stuck</th><th>Moved out</th><th>Interested</th><th>Sales-push</th></tr></thead><tbody>${rows}</tbody></table>
      <div style="padding:8px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)">Priority: work Fresh first, then R2M→Market Visit and MV→Sale, then Eligible→R2M, then Try 1/2/3→Eligible. "Stuck" = past the 7-day rule (14 for Market Visit). Interested = incoming call or recapture; Sales-push = only our team called. Click any number.</div></div></div>`;
  $('#apMode').addEventListener('change',e=>setApMode(e.target.value));
  const wd=$('#apDay');if(wd)wd.addEventListener('change',e=>{const d=+e.target.value;SEL.ap={mode:'day',start:d,end:addDays(d,1)};renderAction();});
  const ww=$('#apWeek');if(ww)ww.addEventListener('change',e=>{const w=+e.target.value;SEL.ap={mode:'week',start:w,end:addDays(w,7)};renderAction();});
  const wm=$('#apMonth');if(wm)wm.addEventListener('change',e=>{const m=+e.target.value;SEL.ap={mode:'month',start:m,end:monthEnd(m)};renderAction();});
  const wa=$('#apApply');if(wa)wa.addEventListener('click',()=>{const f=$('#apFrom').value,t=$('#apTo').value;if(f&&t&&dayToMs(f)<=dayToMs(t)){SEL.ap={mode:'range',start:dayToMs(f),end:addDays(dayToMs(t),1)};renderAction();}else toast('Pick a valid range');});
  $('#apFm').addEventListener('change',e=>{SEL.apfm=e.target.value;renderAction();});
  panel.querySelectorAll('[data-m]').forEach(el=>el.addEventListener('click',()=>{const m=el.dataset.m;const st=el.dataset.st?decodeURIComponent(el.dataset.st):'';
    if(m==='movedout')openApMovedOut(SEL.apfm||'',st);
    else if(m.startsWith('rem-'))openApReminders(SEL.apfm||'',m.slice(4));
    else openActionLeads(SEL.apfm||'',st,m);}));}
function apLeadListModal(title,list,stage,start,end){const lim=apLimit(stage);
  const body=list.map(l=>{const d=apDaysInStageAt(l,end);const still=apStillIn(l,stage,end);const over=still&&d!=null&&d>lim;const lc=apLongest(l);const moved=apMovedOutDuring(l,stage,start,end);const worked=apWorked(l,stage,start,end);
    return `<tr class="clk" data-tl="${l.key||l.phone}"><td>${l.name||'—'}</td><td class="num">${l.phone}</td><td>${l.ass||'—'}</td><td class="num ${over?'apred':''}">${still?(d!=null?d+'d':'—'):'<span class="terr">moved out</span>'}</td><td>${worked?'<span class="yes">yes</span>'+(moved?' <span class="terr">(moved)</span>':''):'<span class="no">no</span>'}</td><td>${apConnEver(l)?'connected':'—'}</td><td class="num">${lc?fmtDur(lc):'—'}${lc>=1200?' <span class="pill g">≥20m</span>':''}</td><td>${apInterested(l)?'<span class="pill g">interested</span>':'<span class="pill a">push</span>'}</td><td>${l.nf?new Date(l.nf).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):'—'}</td></tr>`;}).join('');
  $('#mlTitle').innerHTML=title+' ('+list.length+')';
  $('#mlBody').innerHTML=list.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>FM</th><th>In stage</th><th>Worked</th><th>Conn</th><th>Longest call</th><th>Type</th><th>Reminder</th></tr></thead><tbody>${body}</tbody></table>`:`<div style="padding:24px;color:var(--muted)">No leads.</div>`;
  $('#leadModal').classList.add('show');
  $('#mlBody').querySelectorAll('tr[data-tl]').forEach(tr=>tr.addEventListener('click',()=>openLeadTimeline(tr.dataset.tl)));}
function openActionLeads(fm,stage,metric){const p=apPeriod();const start=p.start,end=p.end;const wl=apWorkload(stage,fm,start,end);const lim=apLimit(stage);let list=wl,lbl=stage;
  if(metric==='touched'){list=wl.filter(l=>apWorked(l,stage,start,end));lbl=stage+' · worked today';}
  else if(metric==='untouched'){list=wl.filter(l=>!apWorked(l,stage,start,end));lbl=stage+' · not touched';}
  else if(metric==='stagnant'){list=wl.filter(l=>apStuck(l,stage,end,lim)).sort((a,b)=>(apDaysInStageAt(b,end)||0)-(apDaysInStageAt(a,end)||0));lbl=stage+' · stuck &gt;'+lim+'d';}
  else if(metric==='interested'){list=wl.filter(apInterested);lbl=stage+' · interested';}
  else if(metric==='push'){list=wl.filter(l=>!apInterested(l));lbl=stage+' · sales-push';}
  else lbl=stage+' · in stage (today\u2019s workload)';
  apLeadListModal((fm||'All FMs')+' · '+lbl,list,stage,start,end);}
function openApMovedOut(fm,stage,sub){const p=apPeriod();const all=changesIn(p.start,p.end,fm).filter(c=>c.from===stage);
  const tos=FUNNEL.filter(s=>all.some(c=>c.to===s)).concat([...new Set(all.map(c=>c.to))].filter(s=>!FUNNEL.includes(s)));
  const sf=sub||'';const shown=sf?all.filter(c=>c.to===sf):all;
  const dd=`<div class="toolrow" style="margin:0 0 12px"><label>Moved to</label><select id="apSub"><option value="">All (${all.length})</option>${tos.map(s=>`<option value="${encodeURIComponent(s)}" ${s===sf?'selected':''}>${s} (${all.filter(c=>c.to===s).length})</option>`).join('')}</select></div>`;
  const body=shown.map(c=>`<tr class="clk" data-tl="${c.lid||c.ph}"><td>${scName(c)}</td><td class="num">${c.ph}</td><td>${scDist(c)}</td><td>${c.from} → <b>${c.to}</b></td><td>${scWhen(c)}</td></tr>`).join('');
  $('#mlTitle').textContent=fm+' · '+stage+' moved out'+(sf?' → '+sf:'')+' ('+shown.length+')';
  $('#mlBody').innerHTML=dd+(shown.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>District</th><th>Moved</th><th>When</th></tr></thead><tbody>${body}</tbody></table>`:`<div style="padding:24px;color:var(--muted)">No leads moved out in this period.</div>`);
  $('#leadModal').classList.add('show');
  const ss=$('#apSub');if(ss)ss.addEventListener('change',e=>openApMovedOut(fm,stage,e.target.value?decodeURIComponent(e.target.value):''));
  $('#mlBody').querySelectorAll('tr[data-tl]').forEach(tr=>tr.addEventListener('click',()=>openLeadTimeline(tr.dataset.tl)));}
function openApReminders(fm,kind){const today=todayStart();const mine=[];for(const k in CACHE.leads){const l=CACHE.leads[k];if((l.ass||'—')===fm&&!/^telecaller/i.test(l.ass||''))mine.push(l);}
  let list,lbl;
  if(kind==='due'){list=mine.filter(l=>l.nf!=null&&dayStartMs(l.nf)===today);lbl='reminders due today';}
  else if(kind==='over'){list=mine.filter(l=>l.nf!=null&&dayStartMs(l.nf)<today&&l.status!=='Won'&&l.status!=='Lost').sort((a,b)=>a.nf-b.nf);lbl='overdue reminders';}
  else {list=mine.filter(l=>l.nf==null&&l.status!=='Won'&&l.status!=='Lost');lbl='no reminder set';}
  const body=list.map(l=>`<tr class="clk" data-tl="${l.key||l.phone}"><td>${l.name||'—'}</td><td class="num">${l.phone}</td><td>${l.status||'—'}</td><td>${l.nf?new Date(l.nf).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):'—'}</td><td class="num">${daysInStage(l)!=null?daysInStage(l)+'d':'—'}</td></tr>`).join('');
  $('#mlTitle').textContent=fm+' · '+lbl+' ('+list.length+')';
  $('#mlBody').innerHTML=list.length?`<table><thead><tr><th>Customer</th><th>Phone</th><th>Status</th><th>Reminder</th><th>In stage</th></tr></thead><tbody>${body}</tbody></table>`:`<div style="padding:24px;color:var(--muted)">None.</div>`;
  $('#leadModal').classList.add('show');
  $('#mlBody').querySelectorAll('tr[data-tl]').forEach(tr=>tr.addEventListener('click',()=>openLeadTimeline(tr.dataset.tl)));}

/* ---- ANOMALIES (daily FM mistake list) ---- */
function anPeriod(){if(!SEL.an){const d=latestSpeedDay();SEL.an={mode:'day',start:d,end:addDays(d,1)};}return SEL.an;}
function setAnMode(m){if(m==='day'){const d=latestSpeedDay();SEL.an={mode:'day',start:d,end:addDays(d,1)};}
  else if(m==='week'){const ws=latestWeek();SEL.an={mode:'week',start:ws,end:addDays(ws,7)};}
  else if(m==='month'){const ms=monthOptions().slice(-1)[0];SEL.an={mode:'month',start:ms,end:monthEnd(ms)};}
  else{const ws=latestWeek();SEL.an={mode:'range',start:ws,end:addDays(ws,7)};}renderAnomaly();}
function anControl(p){
  if(p.mode==='day'){const days=speedDayOptions().slice(-60).reverse();if(!days.includes(p.start))days.unshift(p.start);return `<select id="anDay" class="selmono">${days.map(d=>`<option value="${d}" ${d===p.start?'selected':''}>${prettyDay(ymd(d))}</option>`).join('')}</select>`;}
  if(p.mode==='week'){const weeks=weekOptions();return `<select id="anWeek" class="selmono">${weeks.map(w=>`<option value="${w}" ${w===p.start?'selected':''}>${prettyDay(ymd(w))} – ${prettyDay(ymd(addDays(w,6)))}</option>`).join('')}</select>`;}
  if(p.mode==='month'){const months=monthOptions();return `<select id="anMonth">${months.map(m=>`<option value="${m}" ${m===p.start?'selected':''}>${new Date(m).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`).join('')}</select>`;}
  return `<input type="date" id="anFrom" value="${ymd(p.start)}"> <span style="color:var(--muted)">to</span> <input type="date" id="anTo" value="${ymd(addDays(p.end,-1))}"> <button class="mini" id="anApply">Apply</button>`;}
let AN_LAST={};
function anEngine(fm){const p=anPeriod();const start=p.start,end=p.end;const C=cfg();const DAY=86400000;
  const leads=[];for(const k in CACHE.leads){const l=CACHE.leads[k];if(/^telecaller/i.test(l.ass||''))continue;if(/^ajay$/i.test((l.ass||'').trim()))continue;if(fm&&(l.ass||'—')!==fm)continue;leads.push(l);}
  const touchedIn=(l,a,b)=>(l._events||[]).some(e=>e.k==='call'&&e.dir==='out'&&e.t!=null&&e.t>=a&&e.t<b);
  const connEver=l=>(l.conn&&l.conn>0)||(l.dur&&l.dur>0)||(l._events||[]).some(e=>e.k==='call'&&((e.fb&&/connect/i.test(e.fb))||(e.dur&&e.dur>0)));
  const attempts=l=>Math.max(l.calls||0,(l._events||[]).filter(e=>e.k==='call'&&e.dir==='out').length);
  const hasNote=l=>!!(l.lostReason)||(l._events||[]).some(e=>e.k==='note');
  const longCall=l=>(l._events||[]).some(e=>e.k==='call'&&e.dur&&e.dur>=1200);
  /* connected call on a day inside the period with no note that same day (a note on the call itself counts) */
  const connNoNote=l=>{const noteDays=new Set();(l._events||[]).forEach(e=>{if(e.k==='note'&&e.t!=null)noteDays.add(dayStartMs(e.t));});
    return (l._events||[]).some(e=>{if(e.k!=='call'||e.dir!=='out'||!(e.dur>0)||e.t==null)return false;const d=dayStartMs(e.t);
      if(d<start||d>=end)return false;if(noteDays.has(d))return false;if(e.note&&(''+e.note).trim())return false;return true;});};
  const enteredIn=(l,stage,a,b)=>(l._changes||[]).some(c=>c.to===stage&&c.at!=null&&c.at>=a&&c.at<b);
  const lastOut=l=>{let m=null;(l._events||[]).forEach(e=>{if(e.k==='call'&&e.dir==='out'&&e.t!=null&&(m==null||e.t>m))m=e.t;});return m;};
  const stageEntry=l=>l.status==='Fresh'?l.createdOn:(l.statusOn||l.createdOn);
  const spd=l=>l.firstCall!=null?Math.round((l.firstCall-l.createdOn)/60000):null;
  const inWin=l=>{if(!l.createdOn)return false;const dd=new Date(l.createdOn);const h=dd.getHours()+dd.getMinutes()/60;return h>=C.workStart&&h<C.cutoff;};
  /* not touched: went cold N days after the last outgoing call (or after the lead arrived / entered the stage if never called) */
  const wentCold=(l,thr)=>{const lo=lastOut(l);const anchor=lo!=null?lo:stageEntry(l);if(anchor==null)return false;const cd=dayStartMs(anchor)+thr*DAY;return cd>=start&&cd<end&&!touchedIn(l,cd,end);};
  /* stuck: crossed the stage day-limit (entered limit+1 days before the review day) and still sitting there */
  const wentStuck=(l,lim)=>{const e=stageEntry(l);if(e==null)return false;const cd=dayStartMs(e)+(lim+1)*DAY;return cd>=start&&cd<end;};
  const TRY=['Try 1 Not Connected','Try 2 Not Connected','Try 3 Not Connected'];
  const A=[];const push=(id,grp,sev,label,list)=>{if(list.length){A.push({id,grp,sev,label,n:list.length});AN_LAST[id]=list;}};
  // TARGETS
  push('mv_lag','Targets',1,'Market Visit lagging (behind to-date pace)',anTargetLag('mv',fm));
  push('sale_lag','Targets',1,'Sale / LOI lagging (behind to-date pace)',anTargetLag('sale',fm));
  // EFFORT — went cold on this day
  push('fresh_unt','Effort',2,'Fresh went untouched (1 day, no call)',leads.filter(l=>l.status==='Fresh'&&wentCold(l,1)));
  push('elig_unt','Effort',2,'Eligible-Interested went untouched (2 days)',leads.filter(l=>l.status==='Eligible - Interested'&&wentCold(l,2)));
  push('r2m_unt','Effort',2,'Ready-to-Meet went untouched (3 days)',leads.filter(l=>l.status==='Ready To Meet'&&wentCold(l,3)));
  push('mv_unt','Effort',2,'Market Visit went untouched (3 days)',leads.filter(l=>l.status==='Market Visit'&&wentCold(l,3)));
  const createdIn=leads.filter(l=>l.createdOn!=null&&l.createdOn>=start&&l.createdOn<end&&inWin(l));
  push('speed15','Effort',2,'Speed breach — first call over 15 min (in-window)',createdIn.filter(l=>{const s=spd(l);return s==null||s>C.grace15;}));
  push('speed5','Effort',3,'Speed breach — first call 5–15 min (in-window)',createdIn.filter(l=>{const s=spd(l);return s!=null&&s>C.target5&&s<=C.grace15;}));
  // STAGNATION — crossed the day-limit on this day
  push('fresh_stuck','Stagnation',2,'Fresh crossed 7 days',leads.filter(l=>l.status==='Fresh'&&wentStuck(l,7)));
  push('elig_stuck','Stagnation',2,'Eligible-Interested crossed 7 days',leads.filter(l=>l.status==='Eligible - Interested'&&wentStuck(l,7)));
  push('r2m_stuck','Stagnation',2,'Ready-to-Meet crossed 7 days',leads.filter(l=>l.status==='Ready To Meet'&&wentStuck(l,7)));
  push('mv_stuck','Stagnation',2,'Market Visit crossed 14 days (no payment)',leads.filter(l=>l.status==='Market Visit'&&wentStuck(l,14)));
  push('try_stuck','Stagnation',3,'Try 1/2/3 crossed 7 days',leads.filter(l=>TRY.includes(l.status)&&wentStuck(l,7)));
  // QUALITY — moved up this day without a real explanation
  push('elig_noexp','Quality',2,'Moved to Eligible-Interested without a ≥20-min call',leads.filter(l=>enteredIn(l,'Eligible - Interested',start,end)&&!longCall(l)));
  push('r2m_noexp','Quality',2,'Moved to Ready-to-Meet without a ≥20-min call',leads.filter(l=>enteredIn(l,'Ready To Meet',start,end)&&!longCall(l)));
  push('mv_noexp','Quality',2,'Moved to Market Visit without a ≥20-min call',leads.filter(l=>enteredIn(l,'Market Visit',start,end)&&!longCall(l)));
  push('adv_noconn','Quality',2,'Moved to an advanced stage but never connected',leads.filter(l=>(enteredIn(l,'Eligible - Interested',start,end)||enteredIn(l,'Ready To Meet',start,end)||enteredIn(l,'Market Visit',start,end))&&!connEver(l)));
  push('conn_nonote','Quality',2,'Connected call but no note logged (same day)',leads.filter(connNoNote));
  // LOST — moved to Lost this day (per the status-change log, the real transition date)
  const lostIn=leads.filter(l=>enteredIn(l,'Lost',start,end));
  push('lost_noconn','Lost',1,'Lost WITHOUT ever connecting (biggest)',lostIn.filter(l=>!connEver(l)));
  push('lost_few','Lost',1,'Lost with fewer than 5 call attempts',lostIn.filter(l=>attempts(l)<5));
  push('lost_nonote','Lost',2,'Lost with no note / reason recorded',lostIn.filter(l=>!hasNote(l)));
  return A;}
/* per-FM target lag: achieved so far this period vs pro-rated to-date target (reuses Target pace math) */
function fmPaceGap(kind,fm){const wk=weekStart(anPeriod().start);const start=wk,end=addDays(wk,7);
  const perFM=computeTargets(start,end,{fm:'',state:'',district:''});const f=perFM[fm];if(!f)return null;
  const full=kind==='mv'?f.mvTarget:f.saleTarget;const done=kind==='mv'?f.mvAch:f.saleAch;
  const total=Math.max(1,workingDaysBetween(start,end));const elapsed=Math.max(1,workingDaysBetween(start,Math.min(addDays(todayStart(),1),end)));
  const pace=Math.round(full*elapsed/total);
  return {done,pace,full,gap:Math.max(0,pace-done),behind:pace>0&&done<pace};}
function anTargetLag(kind,fm){try{const res=[];const fms=fm?[fm]:apFMs();
  for(const f of fms){const g=fmPaceGap(kind,f);if(g&&g.behind)res.push({key:'TGT::'+kind+'::'+f,phone:'—',name:kind==='mv'?'Market Visit target':'Sale target',ass:f,status:'target',_gap:g});}
  return res;}catch(e){return [];}}
function renderAnomaly(){const panel=$('#anomaly');if(!panel)return;
  if(!hasData()){panel.innerHTML=emptyState('Upload lead data first','The Red Flags page lists every FM mistake for the day — untouched leads, stuck leads, weak qualifications, and bad Lost decisions.');wireEmpty();return;}

  const vals=Object.values(board);const mx=Math.max(1,...vals);
  const boardRows=Object.entries(board).sort((a,b)=>a[1]-b[1]).map(([f,n])=>`<tr class="clk anfmrow" data-fm="${encodeURIComponent(f)}"><td><span class="mk ${n===0?'g':n>=mx&&mx>0?'r':'a'}"></span>${f}${terrTag(f)}</td><td class="num ${n>=mx&&mx>0?'apred':''}">${n}</td></tr>`).join('');

      <div class="spacer"></div><span style="font-size:12px;color:var(--muted)"><span class="andot c"></span>critical <span class="andot w"></span>warning <span class="andot m"></span>minor</span></div>

  $('#anMode').addEventListener('change',e=>setAnMode(e.target.value));
  const wd=$('#anDay');if(wd)wd.addEventListener('change',e=>{const d=+e.target.value;SEL.an={mode:'day',start:d,end:addDays(d,1)};renderAnomaly();});

function openAnomalyLeads(id){const list=AN_LAST[id]||[];const labels={mv_lag:'Market Visit lagging',sale_lag:'Sale / LOI lagging',fresh_unt:'Fresh not touched today',elig_unt:'Eligible not touched 2 days',r2m_unt:'R2M not touched 3 days',mv_unt:'Market Visit not touched 3 days',speed15:'Speed breach >15 min',speed5:'Speed breach 5–15 min',fresh_stuck:'Fresh stuck >7d',elig_stuck:'Eligible stuck >7d',r2m_stuck:'R2M stuck >7d',mv_stuck:'Market Visit stuck >14d',try_stuck:'Try 1/2/3 stuck >7d',elig_noexp:'Eligible without ≥20-min call',r2m_noexp:'R2M without ≥20-min call',mv_noexp:'Market Visit without ≥20-min call',lost_noconn:'Lost without connecting',lost_few:'Lost with <5 attempts',lost_nonote:'Lost with no note',adv_noconn:'Advanced status never connected',conn_nonote:'Connected call, no note logged'};

  const day=86400000;const end=anPeriod().end;
  const conn=l=>(l.conn&&l.conn>0)||(l.dur&&l.dur>0)||(l._events||[]).some(e=>e.k==='call'&&((e.fb&&/connect/i.test(e.fb))||(e.dur&&e.dur>0)));
  const att=l=>Math.max(l.calls||0,(l._events||[]).filter(e=>e.k==='call'&&e.dir==='out').length);
  const note=l=>!!(l.lostReason)||(l._events||[]).some(e=>e.k==='note');

function distStateIndex(){if(DIST2STATE)return DIST2STATE;var m={};
  var put=function(name,st){var k=_normDist(name);if(!k)return;if(!(k in m))m[k]=st;else if(m[k]!==st)m[k]='__AMB__';};
  INDIA_SD.forEach(function(x){x.d.forEach(function(d){

    var out=d.replace(/\([^)]*\)/g,' ');put(out,x.s);        /* outside brackets: "Bengaluru Urban" */

   --------------------------------------------------------------------------

     - Failures are now VISIBLE: on-screen toast + a badge + window.sbStatus().

    try{
      var bin = atob(b64), bytes = new Uint8Array(bin.length);
      for (var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      var st = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      return new Response(st).text();
    }catch(e){ return Promise.resolve(null); }
  }

  // ---- PUSH ----------------------------------------------------------------
  function pushSmallKeys(){
    var payload = SMALL_KEYS.map(function(k){
      var v; try { v = CACHE[k]; } catch(_){ v = null; }
      return { key:k, value: (v===undefined?null:v), updated_at:new Date().toISOString() };
    });
    return fetch(SB_URL + "app_state?on_conflict=key", {
      method:"POST",
      headers: headers({ "Prefer":"resolution=merge-duplicates,return=minimal" }),
      body: JSON.stringify(payload)
    }).then(function(r){
      if(!r.ok) return r.text().then(function(t){ throw new Error("HTTP "+r.status+" "+t.slice(0,160)); });
    });
  }

  function pushOneBatch(b){
    var rows = b.rows || [];
    return gzipToB64(JSON.stringify(rows)).then(function(gz){
      if(gz === null) throw new Error("gzip unsupported in this browser");
      var rec = {
        id: String(b.id), batch_date: b.date, type: b.type, name: b.name || null,
        uploaded_at: b.uploadedAt || null, row_count: rows.length,
        rows_gz: gz, updated_at: new Date().toISOString()
      };
      return fetch(SB_URL + "batches?on_conflict=id", {
        method:"POST",
        headers: headers({ "Prefer":"resolution=merge-duplicates,return=minimal" }),
        body: JSON.stringify([rec])
      }).then(function(r){
        if(!r.ok) return r.text().then(function(t){ throw new Error("HTTP "+r.status+" "+t.slice(0,160)); });
        return rows.length;
      });
    });
  }

  function pushAll(){
    if(STATE.busy) return Promise.resolve();
    STATE.busy = true;
    var batches = [];
    try { batches = (CACHE.batches||[]).filter(function(b){ return b && !String(b.id||"").startsWith("seed"); }); } catch(_){}
    badge("Syncing to cloud\u2026");

    return pushSmallKeys().then(function(){
      // push batches one at a time (sequential = small bodies, no burst)
      return batches.reduce(function(chain, b){
        return chain.then(function(){
          return pushOneBatch(b).then(function(n){ STATE.pushed++; });
        });
      }, Promise.resolve());
    }).then(function(){
      STATE.lastPush = new Date().toLocaleString();
      badge("\u2713 Synced to cloud \u00b7 " + batches.length + " file(s)");
    }).catch(function(e){
      noteError("push", e.message || e);
      say("Cloud sync failed \u2014 " + (e.message||e));
    }).then(function(){ STATE.busy = false; });
  }

  var t=null;
  function schedulePush(){ if(t) clearTimeout(t); t=setTimeout(function(){ t=null; pushAll(); }, PUSH_DEBOUNCE_MS); }

  // ---- PULL ----------------------------------------------------------------
  function pullSmallKeys(){
    return fetch(SB_URL + "app_state?select=key,value", { headers: headers({Accept:"application/json"}) })
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(rows){ var m={}; (rows||[]).forEach(function(x){ if(x&&x.key!=null) m[x.key]=x.value; }); return m; });
  }

  function pullBatches(){
    // metadata first (cheap), then each batch's compressed rows
    return fetch(SB_URL + "batches?select=id,batch_date,type,name,uploaded_at,row_count,rows_gz&order=batch_date.desc",
                 { headers: headers({Accept:"application/json"}) })
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(recs){
        return (recs||[]).reduce(function(chain, rec){
          return chain.then(function(acc){
            return b64ToGunzip(rec.rows_gz||"").then(function(txt){
              var rows = [];
              try { rows = txt ? JSON.parse(txt) : []; } catch(_){ rows = []; }
              acc.push({ id:rec.id, date:rec.batch_date, type:rec.type, name:rec.name,
                         uploadedAt:rec.uploaded_at, rows:rows });
              return acc;
            });
          });
        }, Promise.resolve([]));
      });
  }

  function cacheIsEmpty(){
    try{
      var b = (CACHE.batches)||[];
      var real = b.some(function(x){ return x && !String(x.id||"").startsWith("seed"); });
      var man  = (CACHE.manual)||{}, mas = (CACHE.master&&CACHE.master.districts)||{};
      return !real && Object.keys(man).length===0 && Object.keys(mas).length===0;
    }catch(_){ return false; }
  }

  function pullDown(){
    badge("Checking cloud\u2026");
    return Promise.all([pullSmallKeys(), pullBatches()]).then(function(r){
      var small = r[0], batches = r[1];
      if(!batches.length){ badge("Cloud empty \u00b7 nothing to load"); return 0; }
      SMALL_KEYS.forEach(function(k){ if(small[k]!==undefined && small[k]!==null) { try{ CACHE[k]=small[k]; }catch(_){} } });
      try { CACHE.batches = batches; } catch(_){}
      try { if(typeof rebuild==="function") rebuild(); } catch(_){}
      try { if(typeof persist==="function") persist(); } catch(_){}   // save locally (also re-schedules a push; harmless)
      redraw();
      STATE.lastPull = new Date().toLocaleString();
      var n = batches.reduce(function(s,b){ return s + (b.rows?b.rows.length:0); },0);
      badge("\u2713 Loaded from cloud \u00b7 " + batches.length + " file(s)");
      say("Loaded from cloud \u2014 " + n.toLocaleString() + " rows");
      return batches.length;
    }).catch(function(e){
      noteError("pull", e.message || e);
      return 0;
    });
  }

  // ---- wrap persist() ------------------------------------------------------
  if (typeof window.persist === "function"){
    var _p = window.persist;
    window.persist = function(){
      var r = _p.apply(this, arguments);
      try { schedulePush(); } catch(_){}
      return r;
    };
  }

  // ---- reconcile once after the app's own boot() has settled ---------------
  function syncOnce(){
    if(!hasCS()){ badge("Browser too old for cloud sync", true); return; }
    if (cacheIsEmpty()) pullDown();
    else { badge("Local data found \u00b7 syncing up\u2026"); schedulePush(); }
  }

  // manual control from the console if ever needed
  window.sbPush = pushAll;
  window.sbPull = pullDown;

  if (document.readyState === "complete") setTimeout(syncOnce, 800);
  else window.addEventListener("load", function(){ setTimeout(syncOnce, 800); });

})();
</script>

<script>
/* ============================================================================
   SAFC Tracker — Dashboard drill-down (append-only add-on)
   --------------------------------------------------------------------------
   Added AFTER the app's own script. Does NOT modify any existing app code.

   Makes every number in the Dashboard table clickable. Clicking a cell opens
   the app's existing lead modal listing the exact leads behind that number.

   It does not re-implement any metric. It re-runs the app's own engines and
   reads the lead lists they already produce:
     Sales / Market Visits -> milestone timestamps on CACHE.leads (same test
                              renderDashboard uses)
     Fresh touched         -> ggDay(fm,day).R.coverage.proof
     Nm+ calls             -> ggDay(fm,day).R.deep.proof
     Moves fwd             -> ggDay(fm,day).R.mover.proof
     Fast 1st calls        -> ggDay(fm,day).R.speed.proof
     Green pts             -> union of every ggDay rule's proof for the period
     Red flags             -> anEngine(fm) + the AN_LAST[id] lists it fills

   So the list always matches the number in the table.
   ========================================================================== */
(function(){
  "use strict";

  var COL_LABEL = {
    sales:"Sales", mv:"Market Visits", fresh:"Fresh touched", deep:"Deep calls",
    mover:"Moves fwd", fast:"Fast 1st calls", gpts:"Green pts", red:"Red flags"
  };

  function keyOf(l){ return (l && (l.key || l.phone)) || ""; }

  // Collect the leads behind one FM + one metric, for the dashboard's period.
  function leadsFor(fm, metric){
    var out = {};                        // keyed, so duplicates collapse
    function add(l){ if(l && keyOf(l)) out[keyOf(l)] = l; }

    var p = dbPeriod(), start = p.start, end = p.end;

    // ---- milestone metrics: same condition renderDashboard uses -----------
    if (metric === "sales" || metric === "mv") {
      var field = (metric === "sales") ? "loi" : "marketVisit";
      for (var k in CACHE.leads){
        var l = CACHE.leads[k];
        if ((l.ass||"\u2014") !== fm) continue;
        if (l.ms && l.ms[field] != null && l.ms[field] >= start && l.ms[field] < end) add(l);
      }
      return Object.values(out);
    }

    // ---- red flags: re-run the anomaly engine over the dashboard period ---
    if (metric === "red") {
      var savedAn = SEL.an;
      SEL.an = { mode:p.mode, start:start, end:end };
      try {
        var A = anEngine(fm) || [];
        A.forEach(function(a){
          var list = (typeof AN_LAST !== "undefined" && AN_LAST) ? AN_LAST[a.id] : null;
          (list||[]).forEach(function(l){
            // tag which rule flagged it, for display only (non-destructive copy)
            if (l && keyOf(l)) { out[keyOf(l)] = l; (out[keyOf(l)].__why = out[keyOf(l)].__why || []).push(a.label); }
          });
        });
      } catch(_){}
      SEL.an = savedAn;
      return Object.values(out);
    }

    // ---- green-flag engine metrics: walk the same days renderDashboard does
    var RULE = { fresh:"coverage", deep:"deep", mover:"mover" };
    var days = [];
    for (var d0 = start; d0 < end; d0 = addDays(d0,1)){
      if (new Date(d0).getDay() === 0) continue;   // dashboard skips Sundays
      days.push(d0);
    }

    // "Fast 1st calls" needs care: ggDay's speed.proof holds the FAILING leads
    // when there are any (it is proof for the flag), while the dashboard column
    // counts the leads that were called fast. So rebuild the good cohort here
    // using the app's own speed helpers, to match the number exactly.
    if (metric === "fast") {
      var C = cfg();
      days.forEach(function(d){
        for (var k in CACHE.leads){
          var l = CACHE.leads[k];
          if (/^telecaller/i.test(l.ass||"")) continue;
          if ((l.ass||"\u2014") !== fm) continue;
          if (l.createdOn == null) continue;
          var co;
          try { co = speedCohortDay(l, C); } catch(_){ continue; }
          if (!co || co.cd !== d || !co.live) continue;
          var b;
          try { b = classifyLive(l, C); } catch(_){ continue; }
          if (b === "on5" || b === "in15") add(l);
        }
      });
      return Object.values(out);
    }

    days.forEach(function(d){
      var g;
      try { g = ggDay(fm, d); } catch(_){ return; }
      if (!g || !g.R) return;
      if (metric === "gpts") {
        for (var id in g.R){ (g.R[id].proof || []).forEach(add); }
      } else {
        var r = g.R[RULE[metric]];
        if (r) (r.proof || []).forEach(add);
      }
    });
    return Object.values(out);
  }

  // ---- modal, mirroring the app's own openGgProof layout ------------------
  function openDrill(fm, metric){
    var items;
    try { items = leadsFor(fm, metric); } catch(e){ items = []; }
    var label = COL_LABEL[metric] || metric;
    var showWhy = (metric === "red");

    var head = "<tr><th>Customer</th><th>Phone</th><th>Now</th><th>District</th>" +
               (showWhy ? "<th>Flagged for</th>" : "") + "</tr>";

    var body = items.map(function(l){
      var why = showWhy
        ? "<td style=\"font-size:12px;color:var(--muted)\">" + esc((l.__why||[]).join(" \u00b7 ")) + "</td>"
        : "";
      return "<tr class=\"clk\" data-tl=\"" + esc(keyOf(l)) + "\">" +
             "<td>" + esc(l.name || "\u2014") + "</td>" +
             "<td class=\"num\">" + esc(l.phone || "\u2014") + "</td>" +
             "<td>" + esc(l.status || "\u2014") + "</td>" +
             "<td>" + esc(l.dist || "\u2014") + "</td>" + why + "</tr>";
    }).join("");

    $("#mlTitle").textContent = fm + " \u00b7 " + label +
      (metric === "gpts"
        ? " \u00b7 " + items.length + " lead" + (items.length===1?"":"s") + " behind the points"
        : " (" + items.length + " lead" + (items.length===1?"":"s") + ")");
    $("#mlBody").innerHTML = items.length
      ? "<table><thead>" + head + "</thead><tbody>" + body + "</tbody></table>" +
        "<div style=\"padding:10px 16px;font-size:12px;color:var(--muted)\">" +
        periodLabelTT(dbPeriod()) +
        (metric === "gpts"
          ? " \u00b7 Green pts is a points total, so this lists every lead that contributed across all the green-flag rules \u2014 the lead count will not equal the points."
          : "") +
        " \u00b7 click any lead for its full history.</div>"
      : "<div style=\"padding:24px;color:var(--muted)\">No leads behind this number for " +
        periodLabelTT(dbPeriod()) + ".</div>";

    $("#leadModal").classList.add("show");

    // click a row -> full lead timeline, with a back link to this list
    $("#mlBody").querySelectorAll("tr[data-tl]").forEach(function(tr){
      tr.addEventListener("click", function(){
        try { TL_BACK = function(){ openDrill(fm, metric); }; } catch(_){}
        openLeadTimeline(tr.getAttribute("data-tl"));
      });
    });
  }

  // ---- make the dashboard cells clickable after each render ---------------
  var COLS = ["sales","mv","fresh","deep","mover","fast","gpts","red"];

  function wire(){
    var panel = document.getElementById("dash");
    if (!panel) return;
    var rows = panel.querySelectorAll("tbody tr");
    rows.forEach(function(tr){
      var tds = tr.querySelectorAll("td");
      if (tds.length < 3) return;                        // the "no activity" row
      if (tr.getAttribute("data-drill") === "1") return; // already wired
      tr.setAttribute("data-drill","1");

      // layout: [rank][FM name][...8 metric cells] — metrics start at index 2
      var fm = (tds[1].textContent || "").trim();
      // strip the territory tag that follows the name
      var tag = tds[1].querySelector("span");
      if (tag) fm = (tds[1].childNodes[0].textContent || "").trim();

      COLS.forEach(function(metric, i){
        var td = tds[i+2];
        if (!td) return;
        var n = parseInt((td.textContent||"").replace(/[^0-9-]/g,""), 10);
        if (!n) { td.style.opacity = "0.55"; return; }   // zero: nothing to show
        td.classList.add("clkcell");
        td.style.cursor = "pointer";
        td.title = "Show the " + n + " lead" + (n===1?"":"s") + " behind " + (COL_LABEL[metric]||metric);
        td.addEventListener("click", function(ev){
          ev.stopPropagation();
          openDrill(fm, metric);
        });
      });
    });
  }

  // renderDashboard() rebuilds the table, so re-wire after every render.
  if (typeof window.renderDashboard === "function") {
    var _rd = window.renderDashboard;
    window.renderDashboard = function(){
      var r = _rd.apply(this, arguments);
      try { wire(); } catch(_){}
      return r;
    };
  }
  if (typeof window.render === "function") {
    var _r = window.render;
    window.render = function(){
      var r = _r.apply(this, arguments);
      try { wire(); } catch(_){}
      return r;
    };
  }

  // wire whatever is already on screen
  if (document.readyState === "complete") setTimeout(wire, 400);
  else window.addEventListener("load", function(){ setTimeout(wire, 400); });

})();
</script>
